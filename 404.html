<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NewsTally</title>
<meta name="robots" content="noindex">
<script>
  var path   = window.location.pathname;
  var search = window.location.search;
  var hash   = window.location.hash;

  // /@username → profile
  if (path.match(/^\/@[a-zA-Z0-9_.]+$/)) {
    var username = path.slice(2);
    window.location.replace('/?_open_user=' + encodeURIComponent(username));
  }
  // /post/ID or /s/ID → post
  else if (path.match(/^\/(post|s)\//)) {
    var postId = path.replace(/^\/(post|s)\//, '');
    window.location.replace('/?_open_post=' + encodeURIComponent(postId));
  }
  // /socialgati → index with query string preserved (postid param)
  else if (path === '/socialgati' || path.startsWith('/socialgati')) {
    window.location.replace('/' + search + hash);
  }
  // /newstally → newstally.html with all params preserved
  else if (path === '/newstally' || path.startsWith('/newstally')) {
    window.location.replace('/newstally.html' + search + hash);
  }
  // /news/* → newstally.html
  else if (path.startsWith('/news/')) {
    window.location.replace('/newstally.html' + search + hash);
  }
  // /profile → home with _open_profile
  else if (path === '/profile' || path.startsWith('/profile/')) {
    window.location.replace('/?_open_profile=1');
  }
  // /about
  else if (path === '/about') {
    window.location.replace('/?_open_about=1');
  }
  // Everything else → _route param
  else {
    window.location.replace('/?_route=' + encodeURIComponent(path + search + hash));
  }
</script>
</head>
<body><p style="font-family:sans-serif;text-align:center;padding:40px;color:#737373">Redirecting...</p></body>
</html>
