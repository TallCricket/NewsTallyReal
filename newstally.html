<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NewsTally</title>
<meta name="description" content="Read latest news on NewsTally">
<meta property="og:site_name" content="NewsTally">
<meta property="og:type" content="article">
<meta name="theme-color" content="#1a73e8">
<link rel="icon" href="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Roboto',sans-serif;background:#f8f9fa;color:#202124;-webkit-font-smoothing:antialiased;min-height:100vh}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
img{max-width:100%;display:block}

/* HEADER */
.nt-header{position:sticky;top:0;z-index:100;height:56px;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-bottom:1px solid #e8eaed;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.nt-logo{display:flex;align-items:center;gap:10px}
.nt-logo img{width:34px;height:34px;border-radius:50%;object-fit:cover}
.nt-logo-text{font-size:20px;font-weight:700;color:#1a73e8;letter-spacing:-.3px}
.nt-home-btn{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:#1a73e8;padding:6px 12px;border-radius:8px;transition:background .15s}
.nt-home-btn:hover{background:#e8f0fe}

/* LOADING */
#ld{position:fixed;inset:0;z-index:200;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s}
#ld.hidden{opacity:0;pointer-events:none}
.ld-img{width:72px;height:72px;border-radius:50%;overflow:hidden;box-shadow:0 4px 20px rgba(26,115,232,.3)}
.ld-img img{width:100%;height:100%;object-fit:cover}
.ld-name{font-size:24px;font-weight:700;background:linear-gradient(135deg,#1a73e8,#1557b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ld-bar{width:200px;height:3px;background:#e8eaed;border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:#1a73e8;border-radius:2px;animation:bl 1.5s ease-in-out infinite}
@keyframes bl{0%{width:0}60%{width:80%}100%{width:100%}}
.ld-msg{font-size:13px;color:#5f6368}

/* ERROR */
#err{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;padding:40px 20px;text-align:center;gap:16px}
#err i{font-size:52px;color:#dadce0}
#err h2{font-size:20px;font-weight:700;color:#202124}
#err p{font-size:14px;color:#5f6368;line-height:1.6;max-width:360px}
.nt-btn{display:inline-flex;align-items:center;gap:8px;background:#1a73e8;color:#fff;padding:11px 24px;border-radius:8px;font-size:14px;font-weight:600}
.nt-btn:hover{background:#1557b0}

/* ARTICLE */
#art{display:none;max-width:780px;margin:0 auto;padding-bottom:80px}
.art-hero{width:100%;aspect-ratio:16/9;background:#f1f3f4;overflow:hidden;position:relative}
.art-hero img{width:100%;height:100%;object-fit:cover}
.art-hero-fb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a73e8,#1557b0)}
.art-hero-fb img{width:80px;height:80px;border-radius:50%;opacity:.6}
.art-body{padding:20px 16px 8px}
.art-meta-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.art-cat{background:#e8f0fe;color:#1a73e8;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:4px 12px;border-radius:99px}
.art-rt{font-size:12px;color:#5f6368;display:flex;align-items:center;gap:4px}
.art-title{font-size:clamp(19px,4.5vw,27px);font-weight:700;line-height:1.4;color:#202124;margin-bottom:16px;letter-spacing:-.3px}
.art-src-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#f8f9fa;border-radius:10px;border-left:3px solid #1a73e8;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.art-src-name{font-size:13px;font-weight:700;color:#202124}
.art-src-date{font-size:11px;color:#5f6368;margin-top:2px}
.art-actions{display:flex;gap:8px;flex-wrap:wrap}
.art-act{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;background:#fff;border:1px solid #e8eaed;font-size:12px;font-weight:600;color:#3c4043;transition:all .15s;cursor:pointer}
.art-act:hover{border-color:#1a73e8;color:#1a73e8;background:#e8f0fe}
.art-act.saved{background:#e8f0fe;border-color:#aecbfa;color:#1a73e8}
.art-text{font-size:16px;line-height:1.8;color:#3c4043;margin-bottom:24px}
.art-text p{margin-bottom:14px}
.art-text p:last-child{margin-bottom:0}
.art-nc{padding:24px;text-align:center;background:#f8f9fa;border-radius:12px;margin-bottom:20px}
.art-nc i{font-size:26px;color:#dadce0;display:block;margin-bottom:10px}
.art-nc p{font-size:14px;color:#5f6368;line-height:1.6}
.art-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;align-items:center}
.art-tag-lbl{font-size:12px;color:#5f6368;font-weight:500}
.art-tag{font-size:12px;font-weight:600;color:#1a73e8;background:#e8f0fe;padding:4px 12px;border-radius:99px}
.art-share-row{display:flex;gap:10px;flex-wrap:wrap;padding:16px 0;border-top:1px solid #e8eaed;margin-bottom:8px}
.sh-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.sh-wa{background:#25d366;color:#fff}.sh-wa:hover{background:#1ebe5d}
.sh-tw{background:#000;color:#fff}.sh-tw:hover{background:#333}
.sh-tg{background:#0088cc;color:#fff}.sh-tg:hover{background:#0077b5}
.sh-cp{background:#f1f3f4;color:#3c4043}.sh-cp:hover{background:#e8eaed}
.art-rel{padding:0 16px 16px}
.art-rel-title{font-size:16px;font-weight:700;color:#202124;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.art-rel-title::before{content:'';width:4px;height:20px;background:#1a73e8;border-radius:2px;display:inline-block}
.rel-card{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f1f3f4;cursor:pointer;transition:opacity .15s}
.rel-card:last-child{border-bottom:none}
.rel-card:hover{opacity:.75}
.rel-card img{width:80px;height:60px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#f1f3f4}
.rel-body{flex:1;min-width:0}
.rel-cat{font-size:10px;font-weight:700;color:#1a73e8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.rel-title{font-size:13px;font-weight:600;color:#202124;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rel-src{font-size:11px;color:#9aa0a6;margin-top:4px}

/* FEED */
#feed{display:none;max-width:780px;margin:0 auto;padding:16px}
.feed-hdr{font-size:20px;font-weight:700;color:#202124;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.fc{display:flex;gap:12px;background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:box-shadow .15s;border:1px solid #e8eaed}
.fc:hover{box-shadow:0 4px 14px rgba(0,0,0,.1)}
.fc img{width:90px;height:70px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#f1f3f4}
.fc-body{flex:1;min-width:0}
.fc-cat{font-size:10px;font-weight:700;color:#1a73e8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.fc-title{font-size:14px;font-weight:600;color:#202124;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.fc-meta{font-size:11px;color:#9aa0a6;margin-top:6px}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .2s;z-index:300;white-space:nowrap}
#toast.show{opacity:1}

/* DARK MODE */
@media(prefers-color-scheme:dark){
  body{background:#111118;color:#e8eaed}
  .nt-header{background:rgba(17,17,24,.97);border-bottom-color:#2e2e3e}
  #ld{background:#111118}
  .art-title,.fc-title,.rel-title{color:#e8eaed}
  .art-src-bar,.art-nc{background:#1c1c26}
  .art-src-name{color:#e8eaed}
  .art-text{color:#bdc1c6}
  .art-act{background:#1c1c26;border-color:#2e2e3e;color:#9aa0a6}
  .art-share-row{border-top-color:#2e2e3e}
  .sh-cp{background:#2e2e3e;color:#e8eaed}
  .fc{background:#1c1c26;border-color:#2e2e3e}
  #feed,.art-rel-title,.feed-hdr{color:#e8eaed}
  .rel-card{border-bottom-color:#2e2e3e}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="ld">
  <div class="ld-img"><img src="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png" alt="NewsTally"></div>
  <div class="ld-name">NewsTally</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
  <div class="ld-msg" id="ld-msg">Fetching article...</div>
</div>

<!-- HEADER -->
<header class="nt-header">
  <a href="/" class="nt-logo">
    <img src="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png" alt="NewsTally">
    <span class="nt-logo-text">NewsTally</span>
  </a>
  <a href="/" class="nt-home-btn"><i class="fas fa-home"></i> Home</a>
</header>

<!-- ERROR -->
<div id="err">
  <i class="fas fa-newspaper"></i>
  <h2>Article not found</h2>
  <p id="err-msg">We couldn't find this article. It may have been removed or the link is outdated.</p>
  <a href="/" class="nt-btn"><i class="fas fa-home"></i> Go to NewsTally</a>
</div>

<!-- ARTICLE -->
<div id="art">
  <div class="art-hero" id="art-hero">
    <div class="art-hero-fb" id="art-fb">
      <img src="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png" alt="NewsTally">
    </div>
  </div>
  <div class="art-body">
    <div class="art-meta-top">
      <span class="art-cat" id="art-cat">News</span>
      <span class="art-rt"><i class="far fa-clock" style="font-size:11px"></i><span id="art-rt">2 min read</span></span>
    </div>
    <h1 class="art-title" id="art-title"></h1>
    <div class="art-src-bar">
      <div>
        <div class="art-src-name" id="art-src"></div>
        <div class="art-src-date" id="art-date"></div>
      </div>
      <div class="art-actions">
        <button class="art-act" id="save-btn" onclick="toggleSave()">
          <i class="far fa-bookmark"></i> Save
        </button>
        <button class="art-act" onclick="toggleShare()">
          <i class="fas fa-share-alt"></i> Share
        </button>
      </div>
    </div>
    <div class="art-text" id="art-text"></div>
    <div class="art-share-row" id="share-row" style="display:none">
      <button class="sh-btn sh-wa" onclick="sWA()"><i class="fab fa-whatsapp"></i> WhatsApp</button>
      <button class="sh-btn sh-tw" onclick="sTW()"><i class="fab fa-x-twitter"></i> X</button>
      <button class="sh-btn sh-tg" onclick="sTG()"><i class="fab fa-telegram"></i> Telegram</button>
      <button class="sh-btn sh-cp" onclick="sCopy()"><i class="fas fa-link"></i> Copy Link</button>
    </div>
    <div class="art-tags" id="art-tags"></div>
  </div>
  <div class="art-rel" id="rel-section" style="display:none">
    <div class="art-rel-title">More like this</div>
    <div id="rel-list"></div>
  </div>
</div>

<!-- FEED -->
<div id="feed">
  <div class="feed-hdr"><i class="fas fa-newspaper" style="color:#1a73e8;font-size:20px"></i> Latest Headlines</div>
  <div id="feed-list"></div>
</div>

<div id="toast"></div>

<script>
// ===== CONFIG =====
const SHEET_ID       = '1Wy6rzaCALqPLFx079nqBCDRP7dk3au5eRO4GuMwQ8Sk';
const SHEETS_API_KEY = 'AIzaSyC8D-4bl3GDyj_--BGG1pPdO5Bz63r5iXI';
const SHEET_NAME     = 'Sheet1';

let allNews = [], currentArt = null;
let savedIds = JSON.parse(localStorage.getItem('nt_saved_news_ids') || '[]');

// ===== UTILS =====
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2800);
}

function hideLd() {
  const s = document.getElementById('ld');
  s.classList.add('hidden');
  setTimeout(() => s.style.display = 'none', 450);
}

function showErr(msg) {
  hideLd();
  if (msg) document.getElementById('err-msg').textContent = msg;
  document.getElementById('err').style.display = 'flex';
}

function fmtDate(d) {
  if (!d) return '';
  try {
    const dt = new Date(d);
    return isNaN(dt) ? d : dt.toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'});
  } catch { return d; }
}

function artUrl(a) {
  const base = window.location.origin + '/newstally';
  return `${base}?nid=${encodeURIComponent(a.id)}&q=${encodeURIComponent(a.title)}&cat=${encodeURIComponent(a.category)}&src=${encodeURIComponent(a.source)}`;
}

// ===== FETCH =====
async function fetchNews() {
  document.getElementById('ld-msg').textContent = 'Loading news...';
  // Try REST API
  try {
    const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}?key=${SHEETS_API_KEY}`);
    if (!r.ok) throw new Error();
    const d = await r.json();
    return parse(d.values || []);
  } catch {
    // Fallback: GVIZ
    const r2 = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`);
    const txt = await r2.text();
    const j   = JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rows = j.table.rows.map(r => r.c.map(c => c ? String(c.v || '') : ''));
    return parse(rows);
  }
}

function parse(rows) {
  return rows.slice(1).reverse().map((r, i) => ({
    id: String(r[0]||i), title: r[1]||'', source: r[2]||'',
    date: r[3]||'', description: r[4]||'', url: r[5]||'',
    category: r[6]||'', image: r[7]||''
  })).filter(n => n.title);
}

// ===== FIND ARTICLE =====
function findArt(nid, q, cat) {
  // 1. By ID
  if (nid) {
    const m = allNews.find(n => String(n.id) === String(nid));
    if (m) return m;
  }
  // 2. By title
  if (q) {
    const qd = decodeURIComponent(q).toLowerCase().trim();
    // Exact
    let m = allNews.find(n => (n.title||'').toLowerCase().trim() === qd);
    if (m) return m;
    // Partial (first 60 chars of query)
    const qShort = qd.substring(0, 60);
    m = allNews.find(n => (n.title||'').toLowerCase().includes(qShort));
    if (m) return m;
    // Word overlap (4+ words)
    const qWords = qd.split(/\s+/).filter(w => w.length > 3);
    let best = null, bestS = 0;
    allNews.forEach(n => {
      const tw = (n.title||'').toLowerCase().split(/\s+/);
      const s  = qWords.filter(w => tw.some(t => t.includes(w)||w.includes(t))).length;
      if (s >= 4 && s > bestS) { bestS = s; best = n; }
    });
    if (best) return best;
  }
  // 3. By category
  if (cat) {
    const cd = decodeURIComponent(cat).toLowerCase().trim();
    return allNews.find(n => (n.category||'').toLowerCase().trim() === cd) || null;
  }
  return null;
}

// ===== RENDER ARTICLE =====
function renderArt(a) {
  currentArt = a;
  document.title = a.title + ' — NewsTally';

  // Hero image
  if (a.image) {
    const img = document.createElement('img');
    img.alt = a.title; img.src = a.image;
    img.onload  = () => document.getElementById('art-fb').style.display = 'none';
    img.onerror = () => img.style.display = 'none';
    document.getElementById('art-hero').insertBefore(img, document.getElementById('art-fb'));
  }

  // Fill fields
  document.getElementById('art-cat').textContent  = a.category || 'News';
  document.getElementById('art-rt').textContent   = Math.max(1, Math.ceil(((a.title||'').length+(a.description||'').length)/200)) + ' min read';
  document.getElementById('art-title').textContent = a.title;
  document.getElementById('art-src').textContent  = a.source || 'NewsTally';
  document.getElementById('art-date').textContent = fmtDate(a.date);
  updateSaveBtn();

  // Text
  const textEl = document.getElementById('art-text');
  if (a.description) {
    const sents = a.description.split(/(?<=[.!?])\s+/).filter(s => s.trim());
    textEl.innerHTML = sents.length > 1
      ? sents.map(s => `<p>${s.trim()}</p>`).join('')
      : `<p>${a.description}</p>`;
  } else {
    textEl.style.display = 'none';
    const nc = document.createElement('div');
    nc.className = 'art-nc';
    nc.innerHTML = `<i class="fas fa-newspaper"></i><p>Full article not available in feed.${a.url ? ` <a href="${a.url}" target="_blank" rel="noopener" style="color:#1a73e8;font-weight:600">Read on ${a.source||'source'} →</a>` : ''}</p>`;
    textEl.parentNode.insertBefore(nc, textEl.nextSibling);
  }

  // Tags
  const tagsEl = document.getElementById('art-tags');
  if (a.category) {
    tagsEl.innerHTML = `<span class="art-tag-lbl">Topics:</span><span class="art-tag">#${a.category}</span>${a.source?`<span class="art-tag" style="background:#e6f4ea;color:#1e7e34">${a.source}</span>`:''}`;
  }

  // Related
  const same   = allNews.filter(n => n.id !== a.id && n.category === a.category).slice(0, 4);
  const others = allNews.filter(n => n.id !== a.id && n.category !== a.category).slice(0, 2);
  const rel    = [...same, ...others].slice(0, 5);
  if (rel.length) {
    document.getElementById('rel-section').style.display = 'block';
    document.getElementById('rel-list').innerHTML = rel.map(n => `
      <div class="rel-card" onclick="location.href='${artUrl(n)}'">
        <img src="${n.image||'https://placehold.co/80x60/e8f0fe/1a73e8?text=NT'}" alt="${n.title.substring(0,30)}" loading="lazy" onerror="this.src='https://placehold.co/80x60/e8f0fe/1a73e8?text=NT'">
        <div class="rel-body">
          <div class="rel-cat">${n.category}</div>
          <div class="rel-title">${n.title}</div>
          <div class="rel-src">${n.source} · ${fmtDate(n.date)}</div>
        </div>
      </div>`).join('');
  }

  document.getElementById('art').style.display = 'block';
  hideLd();
}

// ===== SAVE =====
function updateSaveBtn() {
  if (!currentArt) return;
  const saved = savedIds.includes(currentArt.id);
  const btn   = document.getElementById('save-btn');
  btn.innerHTML = saved ? '<i class="fas fa-bookmark"></i> Saved' : '<i class="far fa-bookmark"></i> Save';
  btn.className = 'art-act' + (saved ? ' saved' : '');
}
window.toggleSave = () => {
  if (!currentArt) return;
  const i = savedIds.indexOf(currentArt.id);
  if (i > -1) { savedIds.splice(i, 1); toast('Removed from saved'); }
  else { savedIds.unshift(currentArt.id); toast('🔖 Saved!'); }
  localStorage.setItem('nt_saved_news_ids', JSON.stringify(savedIds));
  updateSaveBtn();
};

// ===== SHARE =====
window.toggleShare = () => {
  const r = document.getElementById('share-row');
  r.style.display = r.style.display === 'none' ? 'flex' : 'none';
  if (r.style.display === 'flex') r.scrollIntoView({behavior:'smooth', block:'nearest'});
};
window.sWA = () => {
  if (!currentArt) return;
  const u = artUrl(currentArt), d = (currentArt.description||'').substring(0,120);
  window.open('https://wa.me/?text=' + encodeURIComponent(`📰 *${currentArt.title}*\n\n${d}...\n\n🔗 ${u}\n\n📲 *NewsTally*`), '_blank');
};
window.sTW = () => {
  if (!currentArt) return;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent('📰 '+currentArt.title)}&url=${encodeURIComponent(artUrl(currentArt))}&via=newstallyofficial`, '_blank');
};
window.sTG = () => {
  if (!currentArt) return;
  const u = artUrl(currentArt), d = (currentArt.description||'').substring(0,100);
  window.open(`https://t.me/share/url?url=${encodeURIComponent(u)}&text=${encodeURIComponent(`📰 ${currentArt.title}\n\n${d}...`)}`, '_blank');
};
window.sCopy = () => {
  if (!currentArt) return;
  const u = artUrl(currentArt);
  navigator.clipboard?.writeText(u).then(() => toast('🔗 Link copied!')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = u; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); toast('🔗 Link copied!');
  });
};

// ===== FEED =====
function renderFeed() {
  document.title = 'NewsTally — Latest Headlines';
  document.getElementById('ld-msg').textContent = 'Loading headlines...';
  const list = document.getElementById('feed-list');
  list.innerHTML = allNews.slice(0, 30).map(n => `
    <div class="fc" onclick="location.href='${artUrl(n)}'">
      <img src="${n.image||'https://placehold.co/90x70/e8f0fe/1a73e8?text=NT'}" alt="${n.title.substring(0,30)}" loading="lazy" onerror="this.src='https://placehold.co/90x70/e8f0fe/1a73e8?text=NT'">
      <div class="fc-body">
        <div class="fc-cat">${n.category}</div>
        <div class="fc-title">${n.title}</div>
        <div class="fc-meta">${n.source} · ${fmtDate(n.date)}</div>
      </div>
    </div>`).join('');
  document.getElementById('feed').style.display = 'block';
  hideLd();
}

// ===== INIT =====
(async () => {
  const p   = new URLSearchParams(window.location.search);
  const nid = p.get('nid') || '';
  const q   = p.get('q')   || '';
  const cat = p.get('cat') || '';

  try {
    allNews = await fetchNews();
    if (!allNews.length) { showErr('Could not load news. Try again later.'); return; }

    if (nid || q) {
      const a = findArt(nid, q, cat);
      if (a) renderArt(a);
      else { renderFeed(); toast('Article not found — showing latest news'); }
    } else {
      renderFeed();
    }
  } catch(e) {
    console.error(e);
    showErr('Failed to load. Check your internet connection.');
  }
})();
</script>
