<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Edit Profile — Socialgati</title>
<link rel="icon" href="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/css/base.css">
<script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark')</script>
<style>
.field-group{padding:14px 16px;border-bottom:1px solid var(--border);background:var(--card)}
.field-label{font-size:12px;font-weight:700;color:var(--sg);margin-bottom:6px}
.field-input{width:100%;background:none;border:none;outline:none;font-size:15px;color:var(--ink);font-family:var(--font)}
.field-bio{resize:none;min-height:80px;line-height:1.5}
</style>
</head><body>
<header class="app-header">
  <div class="app-header-inner">
    <button style="font-size:15px;color:var(--ink);background:none;border:none;cursor:pointer" onclick="history.back()">Cancel</button>
    <span style="font-size:16px;font-weight:700;flex:1;text-align:center">Edit Profile</span>
    <button id="save-btn" onclick="saveProfile()" style="color:var(--sg);font-weight:700;font-size:15px;background:none;border:none;cursor:pointer">Save</button>
  </div>
</header>
<div style="padding-top:52px;padding-bottom:80px">
  <!-- Avatar -->
  <div style="background:var(--card);padding:20px;text-align:center;border-bottom:1px solid var(--border)">
    <div style="position:relative;display:inline-block">
      <img id="edit-av" src="https://ui-avatars.com/api/?name=U" style="width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--border)">
      <div style="position:absolute;bottom:0;right:0;background:var(--sg);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid var(--card)"><i class="fas fa-camera"></i></div>
    </div>
    <p style="font-size:13px;color:var(--sg);margin-top:10px;font-weight:600;cursor:pointer">Change photo (via Google)</p>
  </div>
  <div style="margin-top:8px">
    <div class="field-group"><div class="field-label">Name</div><input type="text" id="edit-name" class="field-input" placeholder="Your name" maxlength="60"></div>
    <div class="field-group"><div class="field-label">Username</div>
      <div style="display:flex;align-items:center"><span style="color:var(--muted);font-size:15px;margin-right:2px">@</span><input type="text" id="edit-username" class="field-input" placeholder="username" maxlength="30" style="text-transform:lowercase" oninput="this.value=this.value.replace(/[^a-z0-9_.]/g,'')"></div>
    </div>
    <div class="field-group"><div class="field-label">Bio</div><textarea id="edit-bio" class="field-input field-bio" placeholder="Tell people about yourself..." maxlength="150"></textarea></div>
  </div>
</div>
<div id="toast"><span></span></div>
<script type="module">
import { db, auth, doc, getDoc, setDoc } from '/js/firebase.js';
import { initAuth, currentUser } from '/js/auth.js';
import { showToast, toggleDarkMode, initTheme } from '/js/utils.js';
window.toggleDarkMode = toggleDarkMode;
initTheme();
initAuth(async (user) => {
  const snap = await getDoc(doc(db,'users',user.uid)).catch(()=>null);
  const d = snap?.data() || {};
  document.getElementById('edit-av').src = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName||'U')}&background=random`;
  document.getElementById('edit-name').value = d.displayName || user.displayName || '';
  document.getElementById('edit-username').value = d.username || '';
  document.getElementById('edit-bio').value = d.bio || '';
}, () => { location.href = '/'; });

window.saveProfile = async () => {
  if (!currentUser) return;
  const name = document.getElementById('edit-name').value.trim();
  const username = document.getElementById('edit-username').value.trim().toLowerCase();
  const bio = document.getElementById('edit-bio').value.trim();
  if (!name) return showToast('Name is required');
  if (username && username.length < 3) return showToast('Username too short');
  const btn = document.getElementById('save-btn');
  btn.textContent = 'Saving...'; btn.style.opacity='.6'; btn.disabled=true;
  try {
    await setDoc(doc(db,'users',currentUser.uid), { displayName:name, username:username||'', bio }, { merge:true });
    showToast('Profile saved!');
    setTimeout(()=>history.back(), 800);
  } catch { showToast('Save failed. Try again.'); }
  finally { btn.textContent='Save'; btn.style.opacity='1'; btn.disabled=false; }
};
</script>
</body></html>
