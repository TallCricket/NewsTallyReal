<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Socialgati</title>
<meta name="robots" content="noindex">
<script>
  var p = window.location.pathname;
  var s = window.location.search;
  // Route pages/* directly
  if (p.startsWith('/pages/')) {
    // These are valid pages, just load index for SPA
    window.location.replace('/?_route=' + encodeURIComponent(p + s));
  } else if (p === '/newstally' || p.startsWith('/newstally')) {
    window.location.replace('/newstally.html' + s);
  } else {
    window.location.replace('/?_route=' + encodeURIComponent(p + s));
  }
</script>
</head><body><p style="font-family:sans-serif;text-align:center;padding:40px;color:#737373">Loading...</p></body></html>
