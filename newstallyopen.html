<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NewsTally</title>
<meta name="theme-color" content="#1a73e8">
<link rel="icon" href="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Roboto',sans-serif;background:#fff;color:#202124;-webkit-font-smoothing:antialiased;min-height:100vh}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
img{max-width:100%;display:block}

/* ===== LOADING ===== */
#ld{position:fixed;inset:0;z-index:999;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .3s}
#ld.hide{opacity:0;pointer-events:none}
.ld-logo{width:64px;height:64px;border-radius:50%;overflow:hidden;box-shadow:0 4px 16px rgba(26,115,232,.25)}
.ld-logo img{width:100%;height:100%;object-fit:cover}
.ld-name{font-size:22px;font-weight:700;color:#1a73e8;letter-spacing:-.3px}
.ld-bar{width:180px;height:3px;background:#e8eaed;border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:#1a73e8;border-radius:2px;animation:ldAnim 1.5s ease-in-out infinite}
@keyframes ldAnim{0%{width:0}60%{width:80%}100%{width:100%}}

/* ===== READING PROGRESS BAR ===== */
#read-progress{position:fixed;top:0;left:0;right:0;height:3px;background:#e8eaed;z-index:200}
#read-fill{height:100%;background:linear-gradient(90deg,#1a73e8,#9334e6);width:0;transition:width .1s}

/* ===== HEADER ===== */
header{position:sticky;top:0;z-index:100;height:54px;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-bottom:1px solid #e8eaed;display:flex;align-items:center;padding:0 12px;gap:8px}
.hdr-back{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:#202124;flex-shrink:0;transition:background .15s}
.hdr-back:hover{background:#f1f3f4}
.hdr-logo{display:flex;align-items:center;gap:8px;flex:1;cursor:pointer}
.hdr-logo img{width:28px;height:28px;border-radius:50%;object-fit:cover}
.hdr-logo-text{font-size:18px;font-weight:700;color:#1a73e8;letter-spacing:-.3px}
.hdr-actions{display:flex;gap:4px;align-items:center}
.hdr-btn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#5f6368;transition:all .15s}
.hdr-btn:hover{background:#f1f3f4;color:#202124}
.hdr-btn.active{color:#1a73e8}

/* ===== MAIN ARTICLE ===== */
.art-wrap{max-width:760px;margin:0 auto;padding-bottom:80px}

/* Hero */
.art-hero{width:100%;aspect-ratio:16/9;overflow:hidden;background:#f1f3f4;position:relative}
.art-hero img{width:100%;height:100%;object-fit:cover;display:block}
.art-hero-fb{position:absolute;inset:0;background:linear-gradient(135deg,#1a73e8,#1557b0);display:flex;align-items:center;justify-content:center}
.art-hero-fb img{width:72px;height:72px;border-radius:50%;opacity:.5}

/* Category badge */
.art-cat{display:inline-flex;align-items:center;gap:5px;background:#e8f0fe;color:#1a73e8;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:4px 12px;border-radius:99px}

/* Title */
.art-title{font-size:clamp(20px,4.5vw,28px);font-weight:700;line-height:1.4;color:#0a0a14;letter-spacing:-.3px;margin:14px 0}

/* Source bar */
.art-src-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#f8f9fa;border-radius:10px;border-left:3px solid #1a73e8;margin-bottom:20px;gap:10px;flex-wrap:wrap}
.art-src-name{font-size:13px;font-weight:700;color:#202124}
.art-src-date{font-size:11px;color:#9aa0a6;margin-top:2px}
.art-actions{display:flex;gap:8px;flex-wrap:wrap}
.art-act{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;background:#fff;border:1.5px solid #e8eaed;font-size:12px;font-weight:600;color:#3c4043;transition:all .15s;cursor:pointer}
.art-act:hover{border-color:#1a73e8;color:#1a73e8;background:#e8f0fe}
.art-act.saved{background:#e8f0fe;border-color:#aecbfa;color:#1a73e8}

/* Body text */
.art-text{font-size:16px;line-height:1.85;color:#3c4043;margin-bottom:24px}
.art-text p{margin-bottom:16px}
.art-text p:last-child{margin-bottom:0}
.art-no-content{padding:28px;text-align:center;background:#f8f9fa;border-radius:12px;margin-bottom:20px}
.art-no-content i{font-size:28px;color:#dadce0;display:block;margin-bottom:10px}

/* Read full article btn */
.read-full-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:#1a73e8;color:#fff;border-radius:10px;font-size:15px;font-weight:700;margin-bottom:20px;transition:all .2s;text-decoration:none}
.read-full-btn:hover{background:#1557b0;transform:translateY(-1px)}

/* Tags */
.art-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;align-items:center;padding-top:12px;border-top:1px solid #f1f3f4}
.art-tag{font-size:12px;font-weight:600;color:#1a73e8;background:#e8f0fe;padding:4px 12px;border-radius:99px;cursor:pointer}
.art-tag:hover{background:#d2e3fc}
.art-tag-src{font-size:12px;color:#5f6368;background:#f1f3f4;padding:4px 12px;border-radius:99px}

/* Share row */
.art-share{display:flex;gap:8px;flex-wrap:wrap;padding:16px 0;border-top:1px solid #e8eaed;margin-bottom:8px}
.sh-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s}
.sh-btn:active{opacity:.8}
.sh-wa{background:#25d366;color:#fff}
.sh-tw{background:#000;color:#fff}
.sh-tg{background:#0088cc;color:#fff}
.sh-cp{background:#f1f3f4;color:#3c4043}

/* Powered by Socialgati */
.powered-by{text-align:center;padding:20px;margin-top:8px}
.powered-by a{display:inline-flex;align-items:center;gap:7px;background:#f0ebff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:700;color:#9334e6;text-decoration:none;transition:background .15s}
.powered-by a:hover{background:#e4d5ff}

/* ===== RELATED ARTICLES ===== */
.related-wrap{padding:0 16px 20px}
.related-hdr{font-size:16px;font-weight:700;color:#202124;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.related-hdr::before{content:'';width:4px;height:20px;background:#1a73e8;border-radius:2px;display:inline-block}
.rel-card{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f1f3f4;cursor:pointer;transition:opacity .15s}
.rel-card:last-child{border-bottom:none}
.rel-card:hover{opacity:.75}
.rel-card img{width:80px;height:60px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#f1f3f4}
.rel-body{flex:1;min-width:0}
.rel-cat{font-size:10px;font-weight:700;color:#1a73e8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.rel-title{font-size:13px;font-weight:600;color:#202124;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rel-src{font-size:11px;color:#9aa0a6;margin-top:4px}

/* ===== TOAST ===== */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .2s;z-index:999;white-space:nowrap}
#toast.show{opacity:1}

/* ===== BOTTOM NAV ===== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:#fff;border-top:1px solid #e8eaed;display:flex;align-items:center;z-index:100}
.bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;height:100%;font-size:10px;font-weight:600;color:#9aa0a6;cursor:pointer;transition:color .15s;text-decoration:none}
.bn-btn i{font-size:20px}
.bn-btn.active{color:#1a73e8}
.bn-compose{flex:1;display:flex;align-items:center;justify-content:center}
.bn-compose-inner{width:44px;height:44px;background:#9334e6;border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(147,52,230,.35)}
.bn-compose-inner i{color:#fff;font-size:18px}

/* ===== DARK MODE ===== */
@media(prefers-color-scheme:dark){
  body{background:#111118;color:#e8eaed}
  header{background:rgba(17,17,24,.97);border-bottom-color:#2e2e3e}
  #ld{background:#111118}
  .art-title,.rel-title{color:#e8eaed}
  .art-src-bar,.art-no-content{background:#1c1c26}
  .art-src-name{color:#e8eaed}
  .art-text{color:#bdc1c6}
  .art-act{background:#1c1c26;border-color:#2e2e3e;color:#9aa0a6}
  .art-share{border-top-color:#2e2e3e}
  .sh-cp{background:#2e2e3e;color:#e8eaed}
  .rel-card{border-bottom-color:#2e2e3e}
  .art-tags{border-top-color:#2e2e3e}
  .art-tag-src{background:#2e2e3e;color:#9aa0a6}
  .bottom-nav{background:#0f0f0f;border-top-color:#2e2e3e}
  .hdr-logo-text{color:#8ab4f8}
  .hdr-back,.hdr-btn{color:#e8eaed}
  .read-full-btn{background:#1557b0}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="ld">
  <div class="ld-logo"><img src="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png" alt="NewsTally"></div>
  <div class="ld-name">NewsTally</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<!-- READING PROGRESS -->
<div id="read-progress"><div id="read-fill"></div></div>

<!-- HEADER -->
<header>
  <button class="hdr-back" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
  <a href="/newstally" class="hdr-logo">
    <img src="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png" alt="NewsTally">
    <span class="hdr-logo-text">NewsTally</span>
  </a>
  <div class="hdr-actions">
    <button class="hdr-btn" id="save-hdr-btn" onclick="toggleSave()" title="Save"><i class="far fa-bookmark"></i></button>
    <button class="hdr-btn" onclick="toggleShare()" title="Share"><i class="fas fa-share-alt"></i></button>
  </div>
</header>

<!-- ARTICLE -->
<div class="art-wrap" id="art-wrap" style="display:none">

  <!-- Hero image -->
  <div class="art-hero" id="art-hero">
    <div class="art-hero-fb" id="art-fb">
      <img src="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png" alt="NewsTally">
    </div>
  </div>

  <div style="padding:16px 16px 0">
    <!-- Category + read time -->
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px">
      <span class="art-cat" id="art-cat"><i class="fas fa-tag" style="font-size:10px"></i> News</span>
      <span style="font-size:12px;color:#9aa0a6;display:flex;align-items:center;gap:4px">
        <i class="far fa-clock" style="font-size:11px"></i>
        <span id="art-rt">2 min read</span>
      </span>
    </div>

    <!-- Title -->
    <h1 class="art-title" id="art-title"></h1>

    <!-- Source bar -->
    <div class="art-src-bar">
      <div>
        <div class="art-src-name" id="art-src"></div>
        <div class="art-src-date" id="art-date"></div>
      </div>
      <div class="art-actions">
        <button class="art-act" id="save-bar-btn" onclick="toggleSave()">
          <i class="far fa-bookmark"></i> Save
        </button>
        <button class="art-act" onclick="toggleShare()">
          <i class="fas fa-share-alt"></i> Share
        </button>
      </div>
    </div>

    <!-- Article text -->
    <div class="art-text" id="art-text"></div>

    <!-- Read full article -->
    <div id="read-full-wrap" style="display:none;margin-bottom:20px">
      <a id="read-full-btn" href="#" target="_blank" rel="noopener" class="read-full-btn">
        <i class="fas fa-external-link-alt"></i> Read Full Article on <span id="read-full-src">Source</span>
      </a>
    </div>

    <!-- Share row -->
    <div class="art-share" id="share-row" style="display:none">
      <button class="sh-btn sh-wa" onclick="shareWA()"><i class="fab fa-whatsapp"></i> WhatsApp</button>
      <button class="sh-btn sh-tw" onclick="shareTW()"><i class="fab fa-x-twitter"></i> X</button>
      <button class="sh-btn sh-tg" onclick="shareTG()"><i class="fab fa-telegram"></i> Telegram</button>
      <button class="sh-btn sh-cp" onclick="shareCopy()"><i class="fas fa-link"></i> Copy</button>
    </div>

    <!-- Tags -->
    <div class="art-tags" id="art-tags"></div>

    <!-- Powered by Socialgati -->
    <div class="powered-by">
      <a href="/"><i class="fas fa-bolt"></i> Powered by Socialgati</a>
    </div>
  </div>

  <!-- Related articles -->
  <div class="related-wrap" id="related-wrap" style="display:none">
    <div class="related-hdr">More like this</div>
    <div id="related-list"></div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="/" class="bn-btn"><i class="fas fa-bolt" style="color:#9334e6"></i>Socialgati</a>
  <a href="/newstally" class="bn-btn active"><i class="fas fa-newspaper"></i>NewsTally</a>
  <a href="/" class="bn-compose"><div class="bn-compose-inner"><i class="fas fa-pen"></i></div></a>
  <button class="bn-btn" onclick="alert('Sign in on Socialgati')"><i class="far fa-bell"></i>Alerts</button>
  <a href="/" class="bn-btn"><i class="far fa-user"></i>Profile</a>
</nav>

<div id="toast"></div>

<script type="module">
import { initializeApp }  from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js';
import { initializeAppCheck, ReCaptchaV3Provider } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-app-check.js';
import { getFirestore, collection, doc, query, orderBy, limit, getDocs, getDoc, where }
  from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js';

// ===== FIREBASE =====
const firebaseConfig = {
  apiKey:            'AIzaSyA4zw5cZqxLwzkTy2e5NiHz-tGKqk1KGdI',
  authDomain:        'newstally-df03c.firebaseapp.com',
  projectId:         'newstally-df03c',
  storageBucket:     'newstally-df03c.appspot.com',
  messagingSenderId: '506893212961',
  appId:             '1:506893212961:web:63882290195da992207260'
};
const app = initializeApp(firebaseConfig);

// ===== APP CHECK — Domain Lock =====
const appCheck = initializeAppCheck(app, {
  provider: new ReCaptchaV3Provider('6LdTUJQsAAAAADKO-4cTLCOqlV7jH02fg3srsoFD'),
  isTokenAutoRefreshEnabled: true
});

const db  = getFirestore(app);

// ===== STATE =====
let currentArt = null;
let allNews    = [];
let savedIds   = JSON.parse(localStorage.getItem('nt_saved_news') || '[]');

// ===== UTILS =====
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2800);
}

function hideLd() {
  const l = document.getElementById('ld');
  l.classList.add('hide');
  setTimeout(() => l.style.display = 'none', 350);
}

function fmtDate(d) {
  if (!d) return '';
  try {
    const dt = new Date(d);
    if (isNaN(dt)) return d;
    const now = new Date(), diff = Math.floor((now - dt) / 1000);
    if (diff < 3600)  return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    if (diff < 604800)return Math.floor(diff/86400) + 'd ago';
    return dt.toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'});
  } catch { return d; }
}

function shareUrl() {
  if (!currentArt) return location.href;
  return `${location.origin}/newstallyopen.html?nid=${encodeURIComponent(currentArt.id)}&q=${encodeURIComponent(currentArt.title)}&cat=${encodeURIComponent(currentArt.category)}&src=${encodeURIComponent(currentArt.source)}`;
}

// ===== READING PROGRESS =====
window.addEventListener('scroll', () => {
  const pct = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
  document.getElementById('read-fill').style.width = Math.min(100, pct) + '%';
});

// ===== FETCH FROM FIREBASE =====
// Fast: fetch single article by ID (~100-200ms)
async function fetchSingleArticle(id) {
  if (!id) return null;

  // Try 1: Direct doc ID lookup (fastest)
  try {
    const snap = await getDoc(doc(db, 'news', id));
    if (snap.exists()) return mapDoc(snap.id, snap.data());
  } catch(e) {}

  // Try 2: Query by 'id' field (article stored with id field)
  try {
    const q2 = query(collection(db,'news'), where('id','==', id), limit(1));
    const snap2 = await getDocs(q2);
    if (!snap2.empty) return mapDoc(snap2.docs[0].id, snap2.docs[0].data());
  } catch(e) {}

  return null;
}

function mapDoc(docId, n) {
  return {
    id:          n.id          || docId,
    title:       n.title       || n.headline || '',
    source:      n.source      || '',
    date:        n.date        || n.savedAt  || '',
    description: n.description || '',
    url:         n.url         || '',
    category:    n.category    || 'General',
    image:       n.image       || ''
  };
}

// Background: fetch related articles (non-blocking)
async function fetchRelated(category, excludeId) {
  try {
    const q = query(
      collection(db, 'news'),
      where('category', '==', category),
      orderBy('savedAt', 'desc'),
      limit(8)
    );
    const snap = await getDocs(q);
    return snap.docs
      .map(d => { const n = d.data(); return { id: n.id||d.id, title: n.title||n.headline||'', source: n.source||'', date: n.date||n.savedAt||'', description: n.description||'', url: n.url||'', category: n.category||'General', image: n.image||'' }; })
      .filter(n => n.title && n.id !== excludeId);
  } catch(e) {
    return [];
  }
}

// Fallback: fetch by title match
async function fetchByTitle(title) {
  try {
    const t = decodeURIComponent(title).trim();
    const snap = await getDocs(query(
      collection(db, 'news'),
      where('title', '>=', t.substring(0, 30)),
      where('title', '<=', t.substring(0, 30) + ''),
      limit(3)
    ));
    if (snap.empty) return null;
    const n = snap.docs[0].data();
    return { id: n.id||snap.docs[0].id, title: n.title||'', source: n.source||'', date: n.date||n.savedAt||'', description: n.description||'', url: n.url||'', category: n.category||'General', image: n.image||'' };
  } catch(e) {
    return null;
  }
}

// Keep fetchNews for related grid (fetches small batch)
async function fetchNews() {
  try {
    const q = query(collection(db, 'news'), orderBy('savedAt', 'desc'), limit(30));
    const snap = await getDocs(q);
    return snap.docs.map(d => {
      const n = d.data();
      return { id: n.id||d.id, title: n.title||n.headline||'', source: n.source||'', date: n.date||n.savedAt||'', description: n.description||'', url: n.url||'', category: n.category||'General', image: n.image||'' };
    }).filter(n => n.title);
  } catch(e) { return []; }
}

// ===== FIND ARTICLE =====
function findArt(nid, q, cat) {
  if (!allNews.length) return null;
  if (nid) {
    const m = allNews.find(n => String(n.id) === String(nid));
    if (m) return m;
  }
  if (q) {
    const qd = decodeURIComponent(q).toLowerCase().trim();
    const qShort = qd.substring(0, 60);
    let m = allNews.find(n => (n.title||'').toLowerCase().includes(qShort));
    if (m) return m;
    // Word overlap
    const words = qd.split(/\s+/).filter(w => w.length > 3);
    let best = null, bestS = 0;
    allNews.forEach(n => {
      const tw = (n.title||'').toLowerCase().split(/\s+/);
      const s = words.filter(w => tw.some(t => t.includes(w)||w.includes(t))).length;
      if (s >= 3 && s > bestS) { bestS = s; best = n; }
    });
    if (best) return best;
  }
  if (cat) {
    const cd = decodeURIComponent(cat).toLowerCase();
    return allNews.find(n => (n.category||'').toLowerCase() === cd) || null;
  }
  return null;
}

// ===== RENDER ARTICLE =====
function renderArt(a) {
  currentArt = a;
  document.title = a.title + ' — NewsTally';

  // Update OG meta
  let ogTitle = document.querySelector('meta[property="og:title"]');
  if (!ogTitle) { ogTitle = document.createElement('meta'); ogTitle.setAttribute('property','og:title'); document.head.appendChild(ogTitle); }
  ogTitle.setAttribute('content', a.title);

  // Hero image
  if (a.image) {
    const img = document.createElement('img');
    img.alt = a.title; img.src = a.image;
    img.onload  = () => document.getElementById('art-fb').style.display = 'none';
    img.onerror = () => img.remove();
    document.getElementById('art-hero').insertBefore(img, document.getElementById('art-fb'));
  }

  // Fields
  document.getElementById('art-cat').innerHTML = `<i class="fas fa-tag" style="font-size:10px"></i> ${a.category || 'News'}`;
  document.getElementById('art-rt').textContent  = Math.max(1, Math.ceil(((a.title||'').length+(a.description||'').length)/200)) + ' min read';
  document.getElementById('art-title').textContent = a.title;
  document.getElementById('art-src').textContent   = a.source || 'NewsTally';
  document.getElementById('art-date').textContent  = fmtDate(a.date);

  // Save btn state
  updateSaveBtn();

  // Text
  const textEl = document.getElementById('art-text');
  if (a.description) {
    const sents = a.description.split(/(?<=[.!?])\s+/).filter(s => s.trim().length > 5);
    textEl.innerHTML = sents.length > 1
      ? sents.map(s => `<p>${s.trim()}</p>`).join('')
      : `<p>${a.description}</p>`;
  } else {
    textEl.style.display = 'none';
    const nc = document.createElement('div');
    nc.className = 'art-no-content';
    nc.innerHTML = `<i class="fas fa-newspaper"></i><p style="font-size:14px;color:#9aa0a6">Full article not available in feed.</p>`;
    textEl.parentNode.insertBefore(nc, textEl.nextSibling);
  }

  // Read full article button
  if (a.url && a.url !== '#') {
    const wrap = document.getElementById('read-full-wrap');
    const btn  = document.getElementById('read-full-btn');
    const src  = document.getElementById('read-full-src');
    wrap.style.display = 'block';
    btn.href = a.url;
    if (src) src.textContent = a.source || 'Source';
  }

  // Tags
  const tagsEl = document.getElementById('art-tags');
  tagsEl.innerHTML = '';
  if (a.category) tagsEl.innerHTML += `<span class="art-tag">#${a.category}</span>`;
  if (a.source)   tagsEl.innerHTML += `<span class="art-tag-src">${a.source}</span>`;

  // Save to reading history
  const history = JSON.parse(localStorage.getItem('nt_history') || '[]');
  const exists  = history.findIndex(h => h.id === a.id);
  if (exists > -1) history.splice(exists, 1);
  history.unshift({ id:a.id, title:a.title, image:a.image, category:a.category, ts:Date.now() });
  localStorage.setItem('nt_history', JSON.stringify(history.slice(0,20)));

  // Show article
  document.getElementById('art-wrap').style.display = 'block';
  hideLd();

  // Load related
  loadRelated(a);
}

// ===== RELATED =====
function loadRelated(a) {
  if (!allNews.length) return;
  const same   = allNews.filter(n => n.id !== a.id && n.category === a.category).slice(0, 4);
  const others = allNews.filter(n => n.id !== a.id && n.category !== a.category).slice(0, 2);
  const rel    = [...same, ...others].slice(0, 5);
  if (!rel.length) return;

  document.getElementById('related-wrap').style.display = 'block';
  document.getElementById('related-list').innerHTML = rel.map(n => `
    <div class="rel-card" onclick="openRelated('${n.id}')">
      <img src="${n.image||'https://placehold.co/80x60/e8f0fe/1a73e8?text=NT'}" alt="${(n.title||'').substring(0,30)}" loading="lazy" onerror="this.src='https://placehold.co/80x60/e8f0fe/1a73e8?text=NT'">
      <div class="rel-body">
        <div class="rel-cat">${n.category}</div>
        <div class="rel-title">${n.title}</div>
        <div class="rel-src">${n.source} · ${fmtDate(n.date)}</div>
      </div>
    </div>`).join('');
}

window.openRelated = (id) => {
  const art = allNews.find(n => n.id === id);
  if (!art) return;
  // Update URL
  const params = new URLSearchParams({ nid:art.id, q:art.title, cat:art.category, src:art.source });
  window.history.pushState({}, '', '/newstallyopen.html?' + params.toString());
  // Re-render without reload
  resetPage();
  renderArt(art);
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

function resetPage() {
  document.getElementById('art-hero').querySelectorAll('img:not(#art-fb img)').forEach(i => i.remove());
  document.getElementById('art-fb').style.display = 'flex';
  document.getElementById('art-text').style.display = '';
  document.getElementById('art-text').innerHTML = '';
  document.getElementById('read-full-wrap').style.display = 'none';
  document.getElementById('share-row').style.display = 'none';
  document.getElementById('related-wrap').style.display = 'none';
  document.querySelector('.art-no-content')?.remove();
}

// ===== SAVE =====
function updateSaveBtn() {
  if (!currentArt) return;
  const saved = savedIds.includes(currentArt.id);
  const icon  = saved ? 'fas' : 'far';
  const label = saved ? 'Saved' : 'Save';
  document.getElementById('save-hdr-btn').innerHTML = `<i class="${icon} fa-bookmark" style="color:${saved?'#1a73e8':'inherit'}"></i>`;
  document.getElementById('save-bar-btn').innerHTML = `<i class="${icon} fa-bookmark"></i> ${label}`;
  document.getElementById('save-bar-btn').className = 'art-act' + (saved ? ' saved' : '');
}

window.toggleSave = () => {
  if (!currentArt) return;
  const i = savedIds.indexOf(currentArt.id);
  if (i > -1) { savedIds.splice(i, 1); toast('Removed from saved'); }
  else { savedIds.unshift(currentArt.id); toast('🔖 Saved!'); }
  localStorage.setItem('nt_saved_news', JSON.stringify(savedIds));
  updateSaveBtn();
};

// ===== SHARE =====
window.toggleShare = () => {
  const r = document.getElementById('share-row');
  r.style.display = r.style.display === 'none' ? 'flex' : 'none';
  if (r.style.display === 'flex') r.scrollIntoView({ behavior:'smooth', block:'nearest' });
};

window.shareWA = () => {
  if (!currentArt) return;
  const u = shareUrl(), d = (currentArt.description||'').substring(0,120);
  window.open(`https://wa.me/?text=${encodeURIComponent(`📰 *${currentArt.title}*\n\n${d}...\n\n🔗 ${u}\n\n📲 *NewsTally*`)}`, '_blank');
};
window.shareTW = () => {
  if (!currentArt) return;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent('📰 '+currentArt.title)}&url=${encodeURIComponent(shareUrl())}&via=newstallyofficial`, '_blank');
};
window.shareTG = () => {
  if (!currentArt) return;
  const u = shareUrl(), d = (currentArt.description||'').substring(0,100);
  window.open(`https://t.me/share/url?url=${encodeURIComponent(u)}&text=${encodeURIComponent(`📰 ${currentArt.title}\n\n${d}...`)}`, '_blank');
};
window.shareCopy = () => {
  const u = shareUrl();
  navigator.clipboard?.writeText(u).then(() => toast('🔗 Link copied!')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = u; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); toast('🔗 Link copied!');
  });
};

// ===== BACK =====
window.goBack = () => {
  if (document.referrer.includes('newstally.online') || document.referrer.includes('localhost')) {
    window.history.back();
  } else {
    window.location.href = '/newstally';
  }
};

// ===== INIT =====
(async () => {
  const p   = new URLSearchParams(window.location.search);
  const nid = p.get('nid') || '';
  const q   = p.get('q')   || '';
  const cat = p.get('cat') || '';

  // Try URL params first (fast render from index.html data)
  // If desc param present — render immediately, then load all news for related
  const descParam = p.get('desc') || '';
  const imgParam  = p.get('img')  || '';
  const srcParam  = p.get('src')  || '';
  const dateParam = p.get('date') || '';
  const urlParam  = p.get('url')  || '';

  // ============================================================
  // STEP 1: INSTANT render from URL params — 0ms wait
  // ============================================================
  if (q) {
    const instantArt = {
      id:          nid || '',
      title:       decodeURIComponent(q),
      category:    decodeURIComponent(cat  || 'News'),
      source:      decodeURIComponent(srcParam || 'NewsTally'),
      date:        '',
      description: '',
      image:       '',
      url:         ''
    };
    renderArt(instantArt); // Shows title immediately — no wait
  }

  // ============================================================
  // STEP 2: Fetch SINGLE article by ID from Firebase — ~100-200ms
  // ============================================================
  if (nid) {
    const article = await fetchSingleArticle(nid);
    if (article) {
      resetPage();
      renderArt(article);
      // STEP 3: Load related in background (non-blocking)
      fetchRelated(article.category, article.id).then(related => {
        allNews = related;
        if (related.length) loadRelated(article);
      });
      return; // Done!
    }
  }

  // ============================================================
  // STEP 2b: Fallback — fetch by title if ID not found
  // ============================================================
  if (q) {
    const byTitle = await fetchByTitle(q);
    if (byTitle) {
      resetPage();
      renderArt(byTitle);
      fetchRelated(byTitle.category, byTitle.id).then(related => {
        allNews = related;
        if (related.length) loadRelated(byTitle);
      });
      return;
    }
  }

  // Already showing from URL params (Step 1) — load related in bg
  if (currentArt) {
    fetchRelated(currentArt.category, currentArt.id).then(related => {
      allNews = related;
      if (related.length) loadRelated(currentArt);
    });
  }
})();
</script>
