<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All News Headlines - NewsTally Archive</title>
    <meta name="description" content="Browse all news headlines and stories published on NewsTally.">
    <meta name="robots" content="index, follow">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #1f2937; }
        .news-item { transition: all 0.2s ease; }
        .news-item:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border-color: #93c5fd; }
        .skeleton { background: #e5e7eb; background-image: linear-gradient(90deg, #e5e7eb 0, #f3f4f6 40px, #e5e7eb 80px); background-size: 600px; animation: shimmer 1.5s infinite linear; }
        @keyframes shimmer { 0% { background-position: -100px } 100% { background-position: 100px } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 group">
                <div class="bg-blue-600 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold text-lg group-hover:bg-blue-700 transition">N</div>
                <h1 class="text-xl font-bold tracking-tight text-gray-900">NewsTally <span class="text-gray-500 font-normal text-sm">Archive</span></h1>
            </a>
            <a href="index.html" class="text-sm font-semibold text-gray-600 hover:text-blue-600 transition bg-gray-100 px-3 py-1.5 rounded-lg">
                <i class="fas fa-arrow-left mr-1"></i> Back to Home
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-8 flex-1 w-full">
        
        <!-- Search & Stats -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
            <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                <i class="fas fa-newspaper text-blue-500"></i> All Headlines
                <span id="count-badge" class="bg-gray-200 text-gray-600 text-xs font-bold px-2 py-0.5 rounded-full ml-2">Loading...</span>
            </h2>
            <div class="relative w-full md:w-64">
                <input type="text" id="search-input" placeholder="Search news..." class="w-full p-2.5 pl-9 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none text-sm transition">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400 text-sm"></i>
            </div>
        </div>

        <!-- News List Container -->
        <div id="news-list-container" class="space-y-4">
            <!-- Loading Skeletons -->
            <div id="loader">
                <div class="bg-white p-4 rounded-xl border border-gray-200 flex gap-4 mb-4">
                    <div class="w-20 h-20 skeleton rounded-lg flex-shrink-0"></div>
                    <div class="flex-1 space-y-3">
                        <div class="h-4 w-3/4 skeleton rounded"></div>
                        <div class="h-3 w-1/2 skeleton rounded"></div>
                        <div class="h-3 w-1/4 skeleton rounded"></div>
                    </div>
                </div>
                <div class="bg-white p-4 rounded-xl border border-gray-200 flex gap-4 mb-4">
                    <div class="w-20 h-20 skeleton rounded-lg flex-shrink-0"></div>
                    <div class="flex-1 space-y-3">
                        <div class="h-4 w-3/4 skeleton rounded"></div>
                        <div class="h-3 w-1/2 skeleton rounded"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Detailed Error State -->
        <div id="error-message" class="hidden flex flex-col items-center justify-center py-12 text-center bg-white rounded-xl border border-red-100 shadow-sm">
            <div class="bg-red-50 p-4 rounded-full mb-4">
                <i class="fas fa-exclamation-triangle text-3xl text-red-500"></i>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-1">Failed to load news</h3>
            <p id="error-details" class="text-gray-500 text-sm mb-6 max-w-md mx-auto">Please check your internet connection.</p>
            <button onclick="location.reload()" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-full font-bold text-sm transition shadow-lg shadow-red-200">
                Try Again
            </button>
        </div>

    </main>

    <!-- Simple Footer for Crawler Links -->
    <footer class="py-8 border-t border-gray-200 bg-white text-center">
        <div class="max-w-4xl mx-auto px-4">
            <div class="flex justify-center gap-6 text-sm font-medium text-gray-600 mb-4">
                <a href="index.html" class="hover:text-blue-600">Home</a>
                <a href="community.html" class="hover:text-purple-600">Community</a>
            </div>
            <p class="text-xs text-gray-400">&copy; 2024 NewsTally Archive. <br>Optimized for Google Search & Indexing.</p>
        </div>
    </footer>

    <script>
        // Exact same credentials as index.html
        const SHEET_ID = '1Wy6rzaCALqPLFx079nqBCDRP7dk3au5eRO4GuMwQ8Sk';
        const API_KEY = 'AIzaSyC8D-4bl3GDyj_--BGG1pPdO5Bz63r5iXI';
        
        let allNewsData = [];

        async function initArchive() {
            const container = document.getElementById('news-list-container');
            const loader = document.getElementById('loader');
            const errorMsg = document.getElementById('error-message');
            const errorDetails = document.getElementById('error-details');
            const countBadge = document.getElementById('count-badge');
            
            try {
                // 1. Fetch
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1?key=${API_KEY}`;
                console.log("Fetching URL:", url); // Debugging
                
                const response = await fetch(url);
                const json = await response.json();

                // 2. Check for API Errors
                if (json.error) {
                    throw new Error(`API Error: ${json.error.message} (Code: ${json.error.code})`);
                }

                if (!json.values || json.values.length === 0) {
                    throw new Error("Sheet data is empty. Please check the Google Sheet.");
                }

                // 3. Process Data
                allNewsData = json.values.slice(1).map(row => ({
                    headline: row[1] || "No Headline",
                    source: row[2] || "Unknown Source",
                    date: row[3] || "Recent",
                    desc: row[4] || "",
                    category: row[6] || 'General',
                    image: (row[7] && row[7].startsWith('http')) ? row[7] : `https://placehold.co/150x150?text=No+Img`
                })).reverse();

                // 4. Render
                loader.classList.add('hidden');
                renderNewsList(allNewsData);
                countBadge.innerText = `${allNewsData.length} Articles`;
                countBadge.classList.replace('bg-gray-200', 'bg-blue-100');
                countBadge.classList.replace('text-gray-600', 'text-blue-800');

            } catch (error) {
                console.error("Archive Load Error:", error);
                loader.classList.add('hidden');
                container.innerHTML = '';
                errorMsg.classList.remove('hidden');
                // Display the specific error on screen
                errorDetails.innerText = error.message;
            }
        }

        function renderNewsList(data) {
            const container = document.getElementById('news-list-container');
            
            if (data.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-gray-400 bg-white rounded-xl border border-dashed border-gray-300">No headlines found.</div>`;
                return;
            }

            container.innerHTML = data.map(item => {
                // Prepare URL
                const articleUrl = `opennews.html?headline=${encodeURIComponent(item.headline.trim())}`;
                
                return `
                <a href="${articleUrl}" class="news-item block bg-white rounded-xl border border-gray-200 p-3 hover:border-blue-300 group">
                    <div class="flex gap-4">
                        <!-- Thumb -->
                        <div class="w-24 h-24 flex-shrink-0 bg-gray-100 rounded-lg overflow-hidden relative">
                            <img src="${item.image}" loading="lazy" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                        </div>
                        
                        <!-- Text -->
                        <div class="flex-1 flex flex-col justify-center">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="bg-gray-100 text-gray-600 text-[10px] font-bold px-1.5 py-0.5 rounded uppercase tracking-wide">${item.category}</span>
                                <span class="text-xs text-gray-400">&bull; ${item.date}</span>
                            </div>
                            
                            <h3 class="font-bold text-gray-900 leading-snug mb-1 group-hover:text-blue-600 transition-colors line-clamp-2">
                                ${item.headline}
                            </h3>
                            
                            <div class="flex items-center text-xs text-gray-500 mt-1">
                                <span class="font-medium">${item.source}</span>
                                <span class="ml-auto text-blue-500 font-medium opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-1">
                                    Read <i class="fas fa-arrow-right text-[10px]"></i>
                                </span>
                            </div>
                        </div>
                    </div>
                </a>
                `;
            }).join('');
        }

        // Real-time Search
        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allNewsData.filter(item => 
                (item.headline && item.headline.toLowerCase().includes(term)) || 
                (item.source && item.source.toLowerCase().includes(term)) ||
                (item.category && item.category.toLowerCase().includes(term))
            );
            renderNewsList(filtered);
        });

        initArchive();
    </script>
</body>
</html>
