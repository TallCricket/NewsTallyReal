<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Post — Socialgati</title>
<link rel="icon" href="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/css/base.css">
<script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark')</script>
<style>
.post-av{width:40px;height:40px;border-radius:50%;object-fit:cover;cursor:pointer;flex-shrink:0}
.post-text{font-size:15px;line-height:1.6;color:var(--ink);white-space:pre-wrap;word-break:break-word;padding:10px 16px 6px}
.post-img img{width:100%;max-height:500px;object-fit:contain;display:block;background:var(--card-2)}
.action-pill{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;background:var(--card-2);font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;border:none;transition:.15s}
.action-pill:hover{background:var(--border)}
.action-pill.liked{background:#fce8e6;color:#c01515}
.action-pill.bookmarked{background:#e8f0fe;color:var(--nt)}
.comment-item{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border)}
.comment-av{width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0}
.comment-input-wrap{position:fixed;bottom:var(--nav-h);left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:10px;align-items:center;z-index:50}
</style>
</head><body>
<header class="app-header">
  <div class="app-header-inner">
    <button class="icon-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
    <span style="font-size:16px;font-weight:700;flex:1;text-align:center">Post</span>
    <button class="icon-btn" onclick="sharePost()"><i class="fas fa-share-nodes"></i></button>
  </div>
</header>

<div style="padding-top:52px;padding-bottom:80px">
  <div id="post-skeleton" style="padding:16px">
    <div style="display:flex;gap:10px;margin-bottom:12px"><div class="skeleton" style="width:40px;height:40px;border-radius:50%;flex-shrink:0"></div><div style="flex:1"><div class="skeleton" style="height:13px;width:40%;margin-bottom:6px;border-radius:4px"></div><div class="skeleton" style="height:11px;width:25%;border-radius:4px"></div></div></div>
    <div class="skeleton" style="height:100px;border-radius:8px;margin-bottom:12px"></div>
  </div>
  <div id="post-content" style="display:none">
    <div style="display:flex;align-items:flex-start;gap:10px;padding:14px 16px 0">
      <img id="post-av" src="https://ui-avatars.com/api/?name=U" class="post-av" onclick="goToProfile()">
      <div style="flex:1">
        <span id="post-username" style="font-size:14px;font-weight:700;cursor:pointer" onclick="goToProfile()"></span>
        <span id="post-type-badge" style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;margin-left:8px;vertical-align:middle"></span>
        <div style="font-size:12px;color:var(--muted);margin-top:1px"><span id="post-handle"></span> · <span id="post-time"></span></div>
      </div>
      <button class="icon-btn" onclick="showPostOptions()" id="post-more-btn"><i class="fas fa-ellipsis"></i></button>
    </div>
    <div id="post-body-text" class="post-text"></div>
    <div id="post-body-img" class="post-img"></div>
    <div id="post-body-repost" style="display:none;margin:8px 16px;border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer"></div>
    <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
      <span id="post-likes-count" style="font-size:14px;font-weight:700"></span>
      <span style="font-size:14px;color:var(--muted);margin-left:4px">Gati</span>
      <span style="margin:0 8px;color:var(--border)">·</span>
      <span id="post-comments-count" style="font-size:14px;font-weight:700"></span>
      <span style="font-size:14px;color:var(--muted);margin-left:4px">Comments</span>
    </div>
    <div style="display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border)">
      <button class="action-pill" id="like-btn" onclick="toggleLike()"><i class="far fa-heart"></i> Gati</button>
      <button class="action-pill" onclick="focusComment()"><i class="far fa-comment"></i> Comment</button>
      <button class="action-pill" onclick="sharePost()"><i class="fas fa-share-nodes"></i></button>
      <button class="action-pill" id="save-btn" onclick="toggleSave()" style="margin-left:auto"><i class="far fa-bookmark"></i></button>
    </div>
    <div id="comments-list"></div>
  </div>
  <div id="post-not-found" style="display:none;text-align:center;padding:60px 20px">
    <i class="fas fa-comment-slash" style="font-size:40px;color:var(--muted);display:block;margin-bottom:12px"></i>
    <p style="font-weight:700">Post not found</p>
    <a href="/" class="btn-primary" style="margin-top:16px;display:inline-flex">← Socialgati</a>
  </div>
</div>

<!-- COMMENT INPUT -->
<div class="comment-input-wrap" id="comment-bar">
  <img id="user-comment-av" src="https://ui-avatars.com/api/?name=U" style="width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0">
  <input type="text" id="comment-input" placeholder="Add a comment..." style="flex:1;background:var(--card-2);border:none;outline:none;padding:9px 14px;border-radius:20px;font-size:14px;color:var(--ink)">
  <button onclick="submitComment()" style="color:var(--sg);font-weight:700;font-size:14px;background:none;border:none;cursor:pointer;padding:0 4px">Post</button>
</div>

<nav class="bottom-nav">
  <a href="/" class="nav-btn"><i class="fas fa-bolt"></i><span>Socialgati</span></a>
  <a href="/newstally.html" class="nav-btn"><i class="far fa-newspaper"></i><span>NewsTally</span></a>
  <div class="nav-compose-wrap"><button class="nav-compose-btn" onclick="openComposePost()"><i class="fas fa-pen"></i></button></div>
  <a href="/pages/notifications.html" class="nav-btn"><i class="far fa-bell"></i><span>Alerts</span></a>
  <a href="/pages/profile.html" class="nav-btn"><i class="far fa-user"></i><span>Profile</span></a>
</nav>
<div id="toast"><span></span></div>

<script type="module">
import { db, auth, doc, getDoc, collection, addDoc, updateDoc, deleteDoc,
         onSnapshot, query, orderBy, arrayUnion, arrayRemove, serverTimestamp,
         increment, onAuthStateChanged } from '/js/firebase.js';
import { initAuth, currentUser, openAuthModal } from '/js/auth.js';
import { showToast, formatTimestamp, processText, toggleDarkMode, initTheme } from '/js/utils.js';

const APP_ID = 'newstally-social';
const postId = new URLSearchParams(location.search).get('id');
let postData = null;
let commentsUnsub = null;

window.toggleDarkMode = toggleDarkMode;
window.openComposePost = () => { if(!currentUser) return openAuthModal(); location.href='/pages/create-post.html'; };

initTheme();
initAuth((user)=>{ document.getElementById('user-comment-av').src = user.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName||'U')}&background=random`; }, ()=>{});

async function loadPost() {
  if (!postId) { showNotFound(); return; }
  const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'reposts', postId)).catch(()=>null);
  if (!snap || !snap.exists()) { showNotFound(); return; }
  postData = snap.data();
  renderPost(postData);
  loadComments();
}

function renderPost(p) {
  document.getElementById('post-skeleton').style.display = 'none';
  document.getElementById('post-content').style.display = '';
  document.title = `${p.username||'User'} on Socialgati`;
  const av = p.userAvatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(p.username||'U')}&background=4285f4&color=fff`;
  document.getElementById('post-av').src = av;
  document.getElementById('post-username').textContent = p.username || 'User';
  document.getElementById('post-handle').textContent = '@'+(p.username||'user');
  document.getElementById('post-time').textContent = formatTimestamp(p.timestamp);
  if (p.type === 'repost') document.getElementById('post-type-badge').innerHTML = '<span style="background:#e6f4ea;color:#1e7e34">↺ Repost</span>';
  else if (p.type === 'poll') document.getElementById('post-type-badge').innerHTML = '<span style="background:#fff4cc;color:#995500">📊 Poll</span>';
  if (p.headline) document.getElementById('post-body-text').innerHTML = processText(p.headline);
  if (p.image) document.getElementById('post-body-img').innerHTML = `<img src="${p.image}" alt="post image">`;
  if (p.type === 'repost' && p.headline) {
    const embed = document.getElementById('post-body-repost');
    embed.style.display = '';
    embed.innerHTML = `${p.image?`<img src="${p.image}" style="width:100%;max-height:140px;object-fit:cover">`:''}
      <div style="padding:10px 12px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:3px">📰 ${p.newsSource||'News'}</div>
      <div style="font-size:14px;font-weight:600;color:var(--ink)">${p.headline}</div></div>`;
    embed.onclick = () => location.href = `/pages/news-detail.html?q=${encodeURIComponent(p.headline)}`;
  }
  updateLikeUI(p.likes || []);
  document.getElementById('post-likes-count').textContent = (p.likes||[]).length;
  document.getElementById('post-comments-count').textContent = p.commentsCount || 0;
}

function updateLikeUI(likes) {
  const btn = document.getElementById('like-btn');
  const isLiked = currentUser && likes.includes(currentUser.uid);
  btn.className = 'action-pill' + (isLiked ? ' liked' : '');
  btn.innerHTML = `<i class="${isLiked?'fas':'far'} fa-heart"></i> Gati`;
}

function loadComments() {
  if (commentsUnsub) commentsUnsub();
  commentsUnsub = onSnapshot(
    query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'reposts', postId, 'comments'), orderBy('timestamp','desc')),
    snap => {
      const list = document.getElementById('comments-list');
      if (snap.empty) { list.innerHTML = `<div style="text-align:center;padding:32px;color:var(--muted)">No comments yet. Be first!</div>`; return; }
      list.innerHTML = snap.docs.map(d => {
        const c = d.data();
        const av = c.userAvatar||`https://ui-avatars.com/api/?name=${encodeURIComponent(c.username||'U')}&background=efefef`;
        return `<div class="comment-item">
          <img src="${av}" class="comment-av" onerror="this.src='https://ui-avatars.com/api/?name=U'">
          <div><span style="font-size:13px;font-weight:700">${c.username||'User'} </span><span style="font-size:13px;color:var(--ink)">${c.text}</span>
          <div style="font-size:11px;color:var(--muted);margin-top:3px">${formatTimestamp(c.timestamp)}</div></div>
        </div>`;
      }).join('');
    }
  );
}

function showNotFound() {
  document.getElementById('post-skeleton').style.display = 'none';
  document.getElementById('post-not-found').style.display = '';
}

window.goToProfile = () => { if (postData?.userId) location.href = `/pages/profile.html?uid=${postData.userId}`; };

window.toggleLike = async () => {
  if (!currentUser) return openAuthModal();
  const ref2 = doc(db, 'artifacts', APP_ID, 'public', 'data', 'reposts', postId);
  const snap = await getDoc(ref2).catch(()=>null);
  if (!snap) return;
  const likes = snap.data().likes || [];
  const isLiked = likes.includes(currentUser.uid);
  await updateDoc(ref2, { likes: isLiked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid) });
  const newLikes = isLiked ? likes.filter(x=>x!==currentUser.uid) : [...likes, currentUser.uid];
  updateLikeUI(newLikes);
  document.getElementById('post-likes-count').textContent = newLikes.length;
};

window.toggleSave = () => {
  const saved = JSON.parse(localStorage.getItem('nt_saved_posts') || '[]');
  const idx = saved.indexOf(postId);
  const btn = document.getElementById('save-btn');
  if (idx > -1) { saved.splice(idx,1); btn.innerHTML = '<i class="far fa-bookmark"></i>'; btn.classList.remove('bookmarked'); showToast('Removed'); }
  else { saved.push(postId); btn.innerHTML = '<i class="fas fa-bookmark"></i>'; btn.classList.add('bookmarked'); showToast('Saved!'); }
  localStorage.setItem('nt_saved_posts', JSON.stringify(saved));
};

window.focusComment = () => document.getElementById('comment-input').focus();

window.submitComment = async () => {
  if (!currentUser) return openAuthModal();
  const input = document.getElementById('comment-input');
  const text = input.value.trim();
  if (!text || text.length > 300) return;
  input.value = '';
  const uSnap = await getDoc(doc(db,'users',currentUser.uid)).catch(()=>null);
  const uData = uSnap?.data() || {};
  await addDoc(collection(db,'artifacts',APP_ID,'public','data','reposts',postId,'comments'), {
    text, userId: currentUser.uid,
    username: uData.username || currentUser.displayName || 'User',
    userAvatar: currentUser.photoURL || '', timestamp: serverTimestamp()
  });
  await updateDoc(doc(db,'artifacts',APP_ID,'public','data','reposts',postId), { commentsCount: increment(1) }).catch(()=>{});
  document.getElementById('post-comments-count').textContent = parseInt(document.getElementById('post-comments-count').textContent||'0') + 1;
};

window.showPostOptions = () => {
  if (!currentUser || !postData) return;
  if (currentUser.uid === postData.userId) {
    if (confirm('Delete this post?')) {
      deleteDoc(doc(db,'artifacts',APP_ID,'public','data','reposts',postId)).then(()=>{ showToast('Deleted'); setTimeout(()=>history.back(),1000); });
    }
  } else {
    if (confirm('Report this post?')) {
      addDoc(collection(db,'artifacts',APP_ID,'public','data','reports'), { postId, reportedBy: currentUser.uid, timestamp: serverTimestamp() }).then(()=>showToast('Reported. Thank you.'));
    }
  }
};

window.sharePost = () => {
  const url = location.href;
  if (navigator.share) navigator.share({ title: postData?.headline || 'Socialgati Post', url }).catch(()=>{});
  else navigator.clipboard?.writeText(url).then(()=>showToast('Link copied!'));
};

loadPost();
</script>
</body></html>
