  <!-- Inline Styles -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.5;
      font-size: 16px;
    }

    body {
      background: #e5e7eb;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      overscroll-behavior: contain;
    }

    #root {
      width: 100%;
      background: #f9fafb;
      position: relative;
      min-height: 100vh;
      max-md:pb-14;
    }

    @media (min-width: 1024px) {
      #root {
        width: 375px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      }
    }

    .gradient-bg {
      background: linear-gradient(90deg, #1e3a8a, #3b82f6);
    }

    header {
      color: #fff;
      padding: 12px 16px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header a {
      color: #fff;
      text-decoration: none;
    }

    header a:hover {
      color: #e5e7eb;
    }

    header .logo-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header .logo-container img {
      width: 24px;
      height: 24px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.025em;
    }

    header .social-links {
      display: flex;
      gap: 8px;
    }

    header .social-links i {
      font-size: 0.875rem;
    }

    .skeleton-card {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 48px - 56px);
      background: #fff;
      overflow: hidden;
      scroll-snap-align: start;
    }

    .skeleton-image {
      flex: 1 1 50%;
      width: 100%;
      background: #e2e8f0;
      border: 2px solid #000000;
      border-radius: 4px;
      animation: shimmer 1.5s infinite linear;
    }

    .skeleton-headline {
      flex: 0 0 2.8rem;
      padding: 8px 16px;
      background: #e2e8f0;
      animation: shimmer 1.5s infinite linear;
    }

    .skeleton-details {
      flex: 1 1 38%;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .skeleton-description {
      flex-grow: 1;
      background: #e2e8f0;
      margin-bottom: 8px;
      animation: shimmer 1.5s infinite linear;
    }

    .skeleton-meta {
      height: 16px;
      background: #e2e8f0;
      width: 50%;
      animation: shimmer 1.5s infinite linear;
    }

    @keyframes shimmer {
      0% {
        background: linear-gradient(to right, #e2e8f0 0%, #edf2f7 50%, #e2e8f0 100%);
        background-size: 200% 100%;
      }
      100% {
        background-position: 200% 0;
      }
    }

    .short-news-card {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 48px - 56px);
      background: #fff;
      overflow: hidden;
      scroll-snap-align: start;
      transition: opacity 0.3s ease;
      opacity: 0;
      will-change: transform, opacity;
      transform: translateZ(0);
    }

    .short-news-card.loaded {
      opacity: 1;
    }

    .short-news-card a {
      display: flex;
      flex-direction: column;
      height: 100%;
      text-decoration: none;
      color: inherit;
      tabindex: 0;
    }

    .short-news-card img {
      flex: 1 1 50%;
      width: 100%;
      object-fit: cover;
      border: 2px solid #000000;
      border-radius: 4px;
      loading: lazy;
      decoding: async;
    }

    .headline-container {
      flex: 0 0 auto;
      padding: 8px 16px;
    }

    .category {
      display: inline-block;
      background-color: #1e3a8a;
      color: #ffffff;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      margin-bottom: 4px;
      max-width: 50%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .short-news-card .headline {
      min-height: 2.8rem;
      font-size: clamp(1rem, 3vw, 1.25rem);
      line-height: 1.4;
      font-weight: 700;
      color: #1f2937;
    }

    .short-news-card .details {
      flex: 1 1 38%;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .short-news-card .description {
      flex-grow: 1;
      overflow-y: auto;
      font-size: 0.9rem;
      color: #4b5563;
      margin-bottom: 8px;
    }

    .short-news-card .meta {
      font-size: 0.75rem;
      color: #9ca3af;
    }

    .short-news-card.no-description img {
      flex: 1 1 70%;
    }

    .short-news-card.no-description .headline-container {
      flex: 0 0 auto;
    }

    .short-news-card.no-description .details {
      display: none;
    }

    .news-feed-container {
      height: calc(100vh - 48px - 56px);
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      scroll-snap-stop: always;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      overscroll-behavior: contain;
      transform: translateZ(0);
    }

    .news-feed-container::-webkit-scrollbar {
      display: none;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 56px;
      background: #ffffff;
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: 0 -2px 6px rgba(0, 0, 0, 0.05);
      z-index: 20;
    }

    @media (min-width: 1024px) {
      .bottom-nav {
        display: none;
      }
    }

    .bottom-nav a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      padding: 0.4rem;
      min-height: 48px;
      transition: all 0.2s ease;
      border-radius: 12px;
      position: relative;
      color: #000000;
      text-decoration: none;
    }

    .bottom-nav a:hover {
      background-color: rgba(0, 0, 0, 0.1);
      transform: scale(1.1);
    }

    .bottom-nav a.nav-active {
      background-color: rgba(0, 0, 0, 0.2);
    }

    .bottom-nav a.nav-active::after {
      content: '';
      position: absolute;
      top: -4px;
      width: 6px;
      height: 6px;
      background-color: #dc2626;
      border-radius: 50%;
    }

    .bottom-nav i {
      font-size: 1.25rem;
    }

    .bottom-nav span {
      font-size: 0.65rem;
    }

    .error-message {
      color: #ef4444;
      text-align: center;
      padding: 16px;
      font-size: 0.875rem;
    }

    .loading-spinner {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 4px solid #1e3a8a;
      border-top: 4px solid transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      z-index: 30;
    }

    .loading-spinner.active {
      display: block;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="root">

      </a>

    <!-- Loading Spinner -->
    <div class="loading-spinner" id="loading-spinner"></div>
  </div>

  <script>
    const API_KEY = 'AIzaSyC8D-4bl3GDyj_--BGG1pPdO5Bz63r5iXI';
    const SHEET_ID = '1Wy6rzaCALqPLFx079nqBCDRP7dk3au5eRO4GuMwQ8Sk';
    const NEWS_SHEET_NAME = 'Sheet1';
    const CACHE_DURATION = 5 * 60 * 1000; // 5 minutes

    let news = [];
    let filteredNews = [];
    let newsCache = { data: null, timestamp: 0 };
    let isFetching = false;

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('Service Worker registered with scope:', registration.scope);
          })
          .catch(error => {
            console.error('Service Worker registration failed:', error);
          });
      });
    }

    // Preload images (limit to 5 concurrent)
    function preloadImages(imageUrls) {
      imageUrls.slice(0, 5).forEach(url => {
        const img = new Image();
        img.src = url;
        img.decoding = 'async';
      });
    }

    // Render skeleton UI
    function renderSkeleton() {
      const newsFeed = document.getElementById('news-feed');
      const skeletonHTML = Array.from({ length: 3 }).map(() => `
        <div class="skeleton-card">
          <div class="skeleton-image"></div>
          <div class="skeleton-headline"></div>
          <div class="skeleton-details">
            <div class="skeleton-description"></div>
            <div class="skeleton-meta"></div>
          </div>
        </div>
      `).join('');
      newsFeed.innerHTML = skeletonHTML;
    }

    // Check in-memory cache
    function getCachedData() {
      const now = Date.now();
      if (newsCache.data && now - newsCache.timestamp < CACHE_DURATION) {
        return newsCache.data;
      }
      return null;
    }

    // Fetch news from Google Sheet
    async function fetchNews() {
      if (isFetching) return;
      isFetching = true;

      const spinner = document.getElementById('loading-spinner');
      spinner.classList.add('active');

      // Check cache first
      const cachedData = getCachedData();
      if (cachedData) {
        news = cachedData;
        filteredNews = [...news];
        requestAnimationFrame(() => {
          renderNews();
          highlightActiveNav();
          spinner.classList.remove('active');
          isFetching = false;
        });
        return;
      }

      try {
        const response = await fetch(
          `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${NEWS_SHEET_NAME}?key=${API_KEY}`
        );
        if (!response.ok) {
          throw new Error(`HTTP error! Status: ${response.status}`);
        }
        const data = await response.json();

        if (!data.values || data.values.length === 0) {
          throw new Error('No data found in the Google Sheet.');
        }

        const rows = data.values;
        const headers = rows[0];
        news = rows.slice(1).map(row => ({
          rank: parseInt(row[0]) || 0,
          headline: row[1] || 'No Headline',
          source: row[2] || 'Unknown Source',
          date: row[3] || 'Unknown Date',
          description: row[4] || 'No description available.',
          link: row[5] || '#',
          category: row[6] || 'Uncategorized',
          image: row[7] || 'https://via.placeholder.com/200x150'
        }));

        filteredNews = [...news];
        if (filteredNews.length === 0) {
          throw new Error('No news items found in the Google Sheet.');
        }

        // Cache the data
        newsCache = {
          data: news,
          timestamp: Date.now()
        };

        // Preload images
        const newsImages = news.map(item => item.image);
        preloadImages(newsImages);

        requestAnimationFrame(() => {
          renderNews();
          highlightActiveNav();
          spinner.classList.remove('active');
          isFetching = false;
        });
      } catch (error) {
        console.error('Error fetching news:', error);
        requestAnimationFrame(() => {
          document.getElementById('news-feed').innerHTML = `<p class="error-message">Failed to load news: ${error.message}. Please try again later.</p>`;
          spinner.classList.remove('active');
          isFetching = false;
        });
      }
    }

    // Render news
    function renderNews() {
      const newsFeed = document.getElementById('news-feed');
      const reversedNews = [...filteredNews].reverse();
      const newsToDisplay = reversedNews;

      const newsHTML = newsToDisplay.map(item => {
        const hasDescription = item.description.trim() !== '' && item.description !== 'No description available.';
        const cardClass = hasDescription ? '' : 'no-description';
        // Sanitize category to prevent XSS
        const sanitizedCategory = item.category.replace(/[<>"'&]/g, c => ({
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#x27;',
          '&': '&amp;'
        })[c]);

        return `
          <article class="short-news-card ${cardClass}">
            <a href="opennews.html?headline=${encodeURIComponent(item.headline)}" aria-label="${item.headline}">
              <img src="${item.image}" alt="${item.headline}" loading="lazy" decoding="async">
              <div class="headline-container">
                <span class="category">${sanitizedCategory}</span>
                <h3 class="headline">${item.headline}</h3>
              </div>
              ${hasDescription ? `
                <div class="details">
                  <p class="description">${item.description}</p>
                  <p class="meta">${item.source} • ${item.date}</p>
                </div>
              ` : ''}
            </a>
          </article>
        `;
      }).join('');

      newsFeed.innerHTML = newsHTML;

      // Add loaded class for fade-in
      document.querySelectorAll('.short-news-card').forEach((card, index) => {
        setTimeout(() => {
          card.classList.add('loaded');
        }, index * 100);
      });

      // Add structured data
      const existingScripts = document.querySelectorAll('script[type="application/ld+json"]');
      existingScripts.forEach(script => script.remove());

      const structuredData = newsToDisplay.map(item => ({
        "@context": "https://schema.org",
        "@type": "NewsArticle",
        "headline": item.headline,
        "image": item.image,
        "datePublished": item.date,
        "description": item.description,
        "author": {
          "@type": "Organization",
          "name": item.source
        },
        "publisher": {
          "@type": "Organization",
          "name": "NewsTally",
          "logo": {
            "@type": "ImageObject",
            "url": "https://newstally.online/images/logo.png"
          }
        }
      }));

      const script = document.createElement('script');
      script.type = 'application/ld+json';
      script.textContent = JSON.stringify(structuredData);
      document.head.appendChild(script);
    }

    // Highlight active navigation
    function highlightActiveNav() {
      const bottomNavLinks = document.querySelectorAll('.bottom-nav a');
      bottomNavLinks.forEach(link => {
        if (link.href.includes('quick.html')) {
          link.classList.add('nav-active');
        }
      });
    }

    // Debounced fetch on load
    let lastFetch = 0;
    window.addEventListener('load', () => {
      const now = Date.now();
      if (now - lastFetch > 1000) {
        lastFetch = now;
        fetchNews();
      }
    });
  </script>
