<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
body{background:#0f0618;display:flex;flex-direction:column;align-items:center;min-height:100vh}

/* === ANIMATED BG === */
.bg-orbs{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;animation:float 8s ease-in-out infinite}
.orb1{width:400px;height:400px;background:radial-gradient(circle,#9334e6,transparent);top:-100px;left:-100px;animation-delay:0s}
.orb2{width:300px;height:300px;background:radial-gradient(circle,#1a73e8,transparent);bottom:-80px;right:-80px;animation-delay:3s}
.orb3{width:200px;height:200px;background:radial-gradient(circle,#ec4899,transparent);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:1.5s}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-20px)}}

/* === PAGE SHELL === */
.shell{width:100%;max-width:680px;height:100vh;display:flex;flex-direction:column;position:relative;z-index:1}

/* === HEADER === */
.hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(15,6,24,.85);backdrop-filter:blur(20px);flex-shrink:0}
.hdr-back{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7);font-size:17px;text-decoration:none;background:rgba(255,255,255,.06);transition:all .15s;flex-shrink:0}
.hdr-back:hover{background:rgba(255,255,255,.12);color:#fff}
.bot-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#9334e6,#1a73e8);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;position:relative;box-shadow:0 4px 20px rgba(147,52,230,.4)}
.bot-av::after{content:'';position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:#22c55e;border-radius:50%;border:2px solid #0f0618}
.bot-info{flex:1}
.bot-name{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.3px}
.bot-sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:1px;display:flex;align-items:center;gap:5px}
.pulse{width:6px;height:6px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.hdr-links{display:flex;gap:8px;flex-shrink:0}
.hdr-link{font-size:12px;font-weight:600;color:rgba(255,255,255,.5);text-decoration:none;padding:5px 10px;border-radius:99px;border:1px solid rgba(255,255,255,.1);transition:all .15s}
.hdr-link:hover{background:rgba(255,255,255,.08);color:#fff}

/* === CHAT === */
.chat{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-track{background:transparent}
.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* === MESSAGES === */
.msg{display:flex;gap:10px;animation:msgIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes msgIn{from{opacity:0;transform:translateY(12px) scale(.96)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse}
.msg-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;margin-top:2px}
.msg-av.bot{background:linear-gradient(135deg,#9334e6,#1a73e8);box-shadow:0 2px 10px rgba(147,52,230,.3)}
.msg-av.user{background:rgba(255,255,255,.1)}
.bubble{max-width:82%;border-radius:18px;padding:11px 15px;font-size:14px;line-height:1.65;word-break:break-word;position:relative}
.bubble.bot{background:rgba(255,255,255,.06);color:#e8eaed;border:1px solid rgba(255,255,255,.08);border-bottom-left-radius:4px;backdrop-filter:blur(10px)}
.bubble.user{background:linear-gradient(135deg,#9334e6,#7c3aed);color:#fff;border-bottom-right-radius:4px;box-shadow:0 4px 16px rgba(147,52,230,.3)}
.bubble b{font-weight:700;color:#fff}
.bubble.bot b{color:#c084fc}
.bubble ul{margin:6px 0 4px 16px}
.bubble li{margin-bottom:4px}
.bubble a{color:#93c5fd;text-decoration:underline}
.bubble .tag{display:inline-block;background:rgba(147,52,230,.2);color:#c084fc;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;margin-right:4px;margin-bottom:4px}

/* === TYPING === */
.typing-wrap{display:flex;gap:10px;align-items:flex-end}
.typing{display:flex;align-items:center;gap:5px;padding:13px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:18px;border-bottom-left-radius:4px}
.typing span{width:7px;height:7px;border-radius:50%;background:#9334e6;animation:dot .8s infinite}
.typing span:nth-child(2){animation-delay:.15s;background:#7c3aed}
.typing span:nth-child(3){animation-delay:.3s;background:#1a73e8}
@keyframes dot{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-6px);opacity:1}}

/* === SUGGESTIONS === */
.sugs{display:flex;flex-wrap:wrap;gap:7px;margin-top:2px}
.sug{padding:7px 14px;background:rgba(147,52,230,.15);color:#c084fc;border:1px solid rgba(147,52,230,.3);border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.sug:hover,.sug:active{background:rgba(147,52,230,.35);border-color:#9334e6;color:#fff}

/* === CATEGORIES === */
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:4px}
.cat-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px;cursor:pointer;transition:all .15s;text-align:center}
.cat-card:hover,.cat-card:active{background:rgba(147,52,230,.15);border-color:#9334e6}
.cat-icon{font-size:22px;display:block;margin-bottom:6px}
.cat-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.7)}

/* === INPUT === */
.inp-area{padding:12px 14px;border-top:1px solid rgba(255,255,255,.06);display:flex;gap:10px;align-items:flex-end;background:rgba(15,6,24,.9);backdrop-filter:blur(20px);flex-shrink:0}
.inp-wrap{flex:1;position:relative}
#inp{width:100%;padding:11px 44px 11px 16px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:24px;color:#fff;font-size:14px;font-family:'Inter',sans-serif;outline:none;resize:none;max-height:120px;line-height:1.5;transition:border-color .15s}
#inp::placeholder{color:rgba(255,255,255,.3)}
#inp:focus{border-color:rgba(147,52,230,.6);background:rgba(255,255,255,.08)}
.inp-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.3);font-size:13px;cursor:pointer;display:none}
.send{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#9334e6,#1a73e8);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;border:none;transition:all .2s;box-shadow:0 4px 14px rgba(147,52,230,.35)}
.send:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
.send:not(:disabled):hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(147,52,230,.5)}

/* === WELCOME === */
.welcome-banner{text-align:center;padding:32px 20px 24px}
.welcome-logo{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#9334e6,#1a73e8);display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 16px;box-shadow:0 8px 32px rgba(147,52,230,.4)}
.welcome-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px}
.welcome-sub{font-size:14px;color:rgba(255,255,255,.5);line-height:1.6;max-width:340px;margin:0 auto}
.features-row{display:flex;justify-content:center;gap:20px;margin-top:20px;flex-wrap:wrap}
.feat{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.45);font-weight:500}
.feat i{color:#9334e6;font-size:13px}

/* === TOAST === */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1c1c2e;color:#e8eaed;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .2s;z-index:9999;border:1px solid rgba(255,255,255,.08);white-space:nowrap}
#toast.show{opacity:1}

/* === FOOTER === */
.page-footer{background:rgba(10,4,18,.9);border-top:1px solid rgba(255,255,255,.06);padding:24px 20px 16px;flex-shrink:0}
.footer-links{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;margin-bottom:12px}
.footer-links a{font-size:12px;color:rgba(255,255,255,.35);text-decoration:none;transition:color .15s}
.footer-links a:hover{color:rgba(255,255,255,.7)}
.footer-copy{text-align:center;font-size:11px;color:rgba(255,255,255,.2)}
</style>
</head>

<div class="shell">

  <div class="hdr">
    <a href="/" class="hdr-back"><i class="fas fa-arrow-left"></i></a>

<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js';
import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js';
import { getAuth, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js';

const app = initializeApp({
  apiKey:'AIzaSyA4zw5cZqxLwzkTy2e5NiHz-tGKqk1KGdI',
  authDomain:'newstally-df03c.firebaseapp.com',
  projectId:'newstally-df03c',
  storageBucket:'newstally-df03c.appspot.com',
  messagingSenderId:'506893212961',
  appId:'1:506893212961:web:63882290195da992207260'
});
const db   = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;
let busy = false;

onAuthStateChanged(auth, u => { currentUser = u; });

// ================================================================
// KNOWLEDGE BASE — Detailed Q&A
// ================================================================
const QA = [
  // ACCOUNT
  { tags:['account','banana','create','register','signup','naya','join'],
    q:'Account kaise banayein?',
    a:`NewsTally pe account banana bahut aasaan hai! 😊<br><br><b>Steps:</b><ul><li>newstally.online kholein</li><li>Neeche Profile icon ya Sign In button tap karein</li><li><b>Google se Sign In</b> — sabse fast tarika</li><li><b>Email + Password</b> se bhi account ban sakta hai</li><li>Pehli baar login ke baad unique username choose karein</li><li>Done! ✅ Account ready hai</li></ul><br>Account bilkul FREE hai — koi subscription nahi.` },

  { tags:['login','sign in','signin','log in'],
    q:'Login kaise karein?',
    a:`Login ke liye:<ul><li>Profile icon (bottom right) tap karein</li><li><b>Google se Sign In</b> tap karein — sabse aasaan</li><li>Ya Email + Password daalo</li></ul><br><b>Problem?</b> Browser cache clear karein ya incognito mode try karein.` },

  { tags:['username','rules','characters','unique','available','taken','change','edit'],
    q:'Username ke kya rules hain?',
    a:`Username rules:<ul><li>Sirf <b>a-z, 0-9, dot (.) aur underscore (_)</b> allowed</li><li>Minimum <b>3 characters</b></li><li>Maximum <b>30 characters</b></li><li>Har user ka username <b>unique</b> hona chahiye — same username do log nahi le sakte</li><li>Change karne ke liye → Profile → ✏️ pencil icon</li><li>Live availability check hota hai type karte time</li></ul>` },

  { tags:['password','bhool','forgot','reset','change','badalna'],
    q:'Password bhool gaya / reset karna hai',
    a:`Password reset:<ul><li>Login page pe <b>"Forgot Password"</b> tap karein</li><li>Email daalo</li><li>Email pe reset link aayega</li><li>Link se naya password set karein</li></ul><br><b>Tip:</b> Google se login karo — password yaad rakhne ki zarurat nahi! 😄` },

  { tags:['delete','account','hatana','remove','permanently','band'],
    q:'Account delete karna hai',
    a:`Account delete karne ke steps:<ul><li>Profile page kholein</li><li>☰ Settings icon tap karein (top right)</li><li>Scroll down karein</li><li><b>"Delete Account"</b> option tap karein</li><li>Confirm karein</li></ul><br>⚠️ <b>Warning:</b> Yeh permanent hai — saara data delete ho jaayega, wapas nahi aayega!` },

  // PHOTO / PROFILE
  { tags:['photo','profile','picture','avatar','image','upload','change','badlna'],
    q:'Profile photo kaise upload/change karein?',
    a:`Profile photo ke baare mein:<ul><li>Agar <b>Google se login</b> kiya hai → Google account ka photo automatically aata hai</li><li>Photo change karne ke liye → <b>Google account ka photo update</b> karo → NewsTally pe automatically update ho jaayega</li><li>Email se login kiya hai → initials (pehla letter) avatar mein dikhta hai</li></ul><br><b>Quick way:</b> Google Photos app → profile → photo change karein ✅` },

  { tags:['display name','naam','name change'],
    q:'Display name kaise change karein?',
    a:`Display name Google account se aata hai.<br><br>Change karne ke liye:<ul><li>Google account settings mein jaao (myaccount.google.com)</li><li>Name update karo</li><li>NewsTally mein re-login karo</li></ul><br>Username alag change kar sakte ho → Profile pe ✏️ icon tap karo.` },

  // POST / SOCIALGATI
  { tags:['post','karna','likhna','create','banao','text','kaise post','socialgati','share'],
    q:'Post kaise karein Socialgati pe?',
    a:`Post karne ke steps:<ul><li>Neeche center mein <b>✏️ (pen) button</b> tap karein</li><li>Text likhein (max <b>500 characters</b>)</li><li>Hashtag add karein <b>#</b> se — jaise #cricket #news</li><li>Photo add karna ho → image icon tap karein</li><li><b>"Share"</b> tap karein</li></ul><br>⚡ Limit: 5 posts per minute (spam prevention)<br><br><b>Post types available:</b><ul><li>📝 Text post</li><li>🖼️ Image post</li><li>📊 Poll</li><li>↺ News repost</li></ul>` },

  { tags:['repost','news share','news post','news ko socialgati'],
    q:'News ko Socialgati pe repost kaise karein?',
    a:`News repost karna:<ul><li>Koi bhi news card tap karein → Article khule</li><li><b>↺ Repost</b> button tap karein</li><li>Automatically Socialgati feed mein aa jaata hai</li></ul><br>⚠️ <b>Note:</b> Ek news sirf <b>ek baar</b> repost ho sakti hai same user se. Dobara repost karne pe "Already reposted" message aayega.` },

  { tags:['gati','like','heart','dil','pasand','react'],
    q:'Gati (Like) kaise karein?',
    a:`Gati karna bahut easy hai!<ul><li>Post pe <b>❤️ Gati button</b> tap karein</li><li>Ya post pe <b>double tap</b> karein — instant Gati!</li><li>Count mein "+1 Gati" add ho jaayega</li></ul><br><b>Gati = NewsTally ka "Like"</b> — yeh hamara original feature hai 😊` },

  { tags:['comment','reply','jawab','comment karna'],
    q:'Comment kaise karein?',
    a:`Comment karne ke steps:<ul><li>Koi bhi post tap karein → Post detail page khulegi</li><li>Scroll karein → Comments section dikhega</li><li>Neeche <b>"Add a comment..."</b> box mein type karein</li><li>Enter ya <b>"Post"</b> button tap karein</li></ul><br>Comments real-time mein dikhte hain! ✅` },

  { tags:['follow','following','follower','kisi ko follow'],
    q:'Kisi ko follow kaise karein?',
    a:`Follow karne ke steps:<ul><li>Us user ki profile tap karein (username ya photo)</li><li><b>"Follow"</b> button tap karein (purple button)</li><li>Ab unki posts aapke feed mein dikhenge</li><li>Unhe notification milega ki aapne follow kiya</li></ul>` },

  { tags:['poll','voting','vote','banao poll'],
    q:'Poll kaise banayein?',
    a:`Poll banane ke steps:<ul><li>✏️ Compose button tap karein</li><li>Post type mein <b>📊 Poll</b> select karein</li><li>Question aur options daalo</li><li>Share karein</li></ul><br>Users vote kar sakte hain aur results real-time mein dikhte hain!` },

  // SEARCH
  { tags:['search','dhundhna','find','khabar','news search'],
    q:'News kaise search karein?',
    a:`News search ke liye:<ul><li>News page pe <b>🔍 search button</b> tap karein (bottom-left floating button)</li><li>Topic, headline, ya source name type karein</li><li>Live suggestions dikhenge with highlighted matches</li><li>Article tap karein → seedha khulega</li></ul><br><b>Tip:</b> Recent searches save hote hain!<br><b>Voice search</b> bhi available hai 🎤` },

  { tags:['user search','log dhundho','find user','socialgati search'],
    q:'Socialgati pe kisi user ko kaise dhundhein?',
    a:`User search:<ul><li>Socialgati page pe <b>🔍 button</b> tap karein</li><li>@username ya display name type karein</li><li>Instagram-style clean results dikhenge</li><li>Tap karein → profile khulegi</li></ul>` },

  // SAVE
  { tags:['save','bookmark','saved','baad mein padhna'],
    q:'News save/bookmark kaise karein?',
    a:`News save karna:<ul><li>Koi bhi news article kholein</li><li>Header mein ya source bar mein <b>🔖 bookmark icon</b> tap karein</li><li>"Saved!" toast dikhega</li></ul><br>Saved news dekhne ke liye:<ul><li>Profile → <b>Saved tab</b> (🔖 icon)</li></ul><br>⚠️ <b>Note:</b> Saves sirf aapke device pe stored hain (localStorage).` },

  // NOTIFICATIONS
  { tags:['notification','alert','bell','suchna','nahi aa rahi','badge'],
    q:'Notifications kaise kaam karti hain?',
    a:`Notifications ke baare mein:<ul><li>🔔 Bell icon tap karein (header ya bottom nav)</li><li>Notification aati hai jab:<br>→ Koi <b>Gati kare</b> aapki post pe<br>→ Koi <b>comment kare</b><br>→ Koi <b>follow kare</b></li><li>Blue dot = unread notification hai</li><li>Notification tap karein → related post khulega</li></ul><br>Directly visit: <a href="/notifications.html">notifications.html</a>` },

  // SETTINGS
  { tags:['settings','dark mode','dark','theme','color','font','language','hindi','english'],
    q:'Settings mein kya kya hai?',
    a:`Settings mein ye options hain:<ul><li>🌙 <b>Dark Mode</b> — raat ke liye dark theme</li><li>🔤 <b>Font Size</b> — A- ya A+ se adjust karo</li><li>🎨 <b>Accent Color</b> — Blue, Green, Purple, Red, Orange</li><li>🌐 <b>Language</b> — English ya Hindi</li><li>⏰ <b>Auto Dark Schedule</b> — specific time pe dark mode</li><li>Sign Out</li><li>Delete Account</li></ul><br>Settings kholein: Profile → ☰ hamburger icon` },

  { tags:['dark mode','dark','andhera','raat','night'],
    q:'Dark mode kaise on karein?',
    a:`Dark mode on karna:<ul><li>Profile page kholein</li><li>Settings (☰ icon top right) tap karein</li><li><b>Dark Mode toggle</b> on karein</li></ul><br><b>Auto Dark Schedule:</b> Settings mein specific time set karo — automatically on/off! 🌙` },

  // SHARE

// State
let busy2 = false;
const $ = id => document.getElementById(id);

// Toast
const toast = msg => {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2600);
};

// Auto resize textarea
window.autoResize = el => {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};

window.showClear = val => {
  $('inp-clear').style.display = val ? 'block' : 'none';
};

window.clearInp = () => {
  $('inp').value = '';
  $('inp').style.height = 'auto';
  $('inp-clear').style.display = 'none';
  $('inp').focus();
};

// Scroll to bottom
const scrollDown = () => {
  const c = $('chat');
  setTimeout(() => c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' }), 60);
};

// ================================================================
// RENDER MESSAGES
// ================================================================
function addBot(html, sugs, cats) {
  const area = $('chat');
  const div  = document.createElement('div');
  div.className = 'msg bot';

  let extra = '';
  if (sugs && sugs.length) {
    extra += `<div class="sugs" style="margin-top:10px">${sugs.map(s =>
      `<button class="sug" onclick="tapSug('${s.replace(/'/g,"\\'")}')"> ${s}</button>`
    ).join('')}</div>`;
  }
  if (cats && cats.length) {
    extra += `<div class="cat-grid" style="margin-top:10px">${cats.map(c =>
      `<div class="cat-card" onclick="tapSug('${c.label}')"><span class="cat-icon">${c.icon}</span><div class="cat-name">${c.label}</div></div>`
    ).join('')}</div>`;
  }

  div.innerHTML = `
    <div class="msg-av bot">🤖</div>
    <div style="flex:1;min-width:0">
      <div class="bubble bot">${html}</div>
      ${extra}
    </div>`;
  area.appendChild(div);
  scrollDown();
}

function addUser(text) {
  const area = $('chat');
  const div  = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `
    <div class="msg-av user"><i class="fas fa-user" style="font-size:13px;color:rgba(255,255,255,.7)"></i></div>
    <div class="bubble user">${esc(text)}</div>`;
  area.appendChild(div);
  scrollDown();
}

function showTyping() {
  const area = $('chat');
  const div  = document.createElement('div');
  div.className = 'msg bot typing-wrap';
  div.id = 'typ';
  div.innerHTML = `
    <div class="msg-av bot">🤖</div>
    <div class="typing"><span></span><span></span><span></span></div>`;
  area.appendChild(div);
  scrollDown();
}

function hideTyping() { $('typ')?.remove(); }

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ================================================================
// FIND ANSWER
// ================================================================
function findAnswer(msg) {
  const q = msg.toLowerCase().trim();
  let best = null, bestScore = 0;

  QA.forEach(item => {
    let score = 0;
    item.tags.forEach(tag => {
      if (q.includes(tag)) score += tag.split(' ').length > 1 ? 5 : (tag.length > 4 ? 3 : 2);
    });
    const qWords = q.split(/\s+/);
    qWords.forEach(w => {
      if (w.length > 3) item.tags.forEach(t => {
        if (t.includes(w) || w.includes(t)) score += 1;
      });
    });
    if (score > bestScore) { bestScore = score; best = item; }
  });

  return bestScore >= 2 ? best.a : null;
}

// ================================================================
// SAVE TO FIREBASE (chat history)
// ================================================================
async function saveToFirebase(userMsg, botReply) {
  if (!currentUser) return;
  try {
    await addDoc(collection(db, 'sarju_chats'), {
      userId:    currentUser.uid,
      userMsg:   userMsg,
      botReply:  botReply.replace(/<[^>]+>/g,' ').substring(0, 300),
      timestamp: serverTimestamp()
    });
  } catch(e) {}
}

// ================================================================
// SEND
// ================================================================
window.send = () => {
  if (busy2) return;
  const inp  = $('inp');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = '';
  inp.style.height = 'auto';
  $('inp-clear').style.display = 'none';
  $('snd').disabled = true;
  busy2 = true;

  addUser(text);
  showTyping();

  const delay = 350 + Math.random() * 400;
  setTimeout(async () => {
    hideTyping();
    const ans = findAnswer(text);

    let reply;
    if (ans) {
      reply = ans;
      addBot(reply);
    } else {
      reply = `Hmm, mujhe is sawaal ka exact jawab nahi pata. 🤔<br><br>In topics mein se kuch poochh sakte hain:`;
      addBot(reply, SUGGESTIONS.slice(0,6));
    }

    await saveToFirebase(text, reply);

    busy2 = false;
    $('snd').disabled = false;
    inp.focus();
  }, delay);
};

window.tapSug = text => {
  $('inp').value = text;
  send();
};
