<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NewsTally Shorts</title>
<meta name="theme-color" content="#000">
<link rel="icon" href="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* RESET */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}

/* VIEWPORT — GPU layer */
#vp{position:fixed;left:0;right:0;bottom:0;overflow:hidden;transform:translateZ(0);-webkit-transform:translateZ(0)}

/* TRACK — only 3 cards in DOM, recycled */
#track{
  position:absolute;top:0;left:0;width:100%;
  will-change:transform;
  transform:translate3d(0,0,0);
  -webkit-transform:translate3d(0,0,0);
}

/* ── CARD ── */
.card{
  position:absolute;left:0;width:100%;
  overflow:hidden;
  display:flex;flex-direction:column;
  background:#111118;
  will-change:transform;
  transform:translate3d(0,0,0);
  -webkit-transform:translate3d(0,0,0);
  contain:layout style paint;
}

/* ── IMAGE SECTION (top 38%) ── */
.c-img-wrap{
  flex:0 0 38%;
  position:relative;
  overflow:hidden;
  background:#1a1a2e;
  /* GPU layer for image */
  transform:translateZ(0);
}
.c-img{
  width:100%;height:100%;
  object-fit:cover;display:block;
  opacity:0;
  /* Fast reveal */
  transition:opacity .28s ease;
  will-change:opacity;
  transform:translateZ(0);
}
.c-img.v{opacity:1}
/* Gradient fade into content below */
.c-img-fade{
  position:absolute;bottom:0;left:0;right:0;
  height:60px;
  background:linear-gradient(to bottom,transparent,#111118);
  pointer-events:none;
}
/* No-image placeholder */
.c-img-ph{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:10px;
}
.c-img-ph i{font-size:36px;opacity:.25}
.c-img-ph span{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.3;color:#fff}

/* No-image card gradients */
.card.gc .c-img-wrap{background:linear-gradient(135deg,#0d3322,#1a4a2e)}
.card.gs .c-img-wrap{background:linear-gradient(135deg,#2a0d4a,#1a0d37)}
.card.gt .c-img-wrap{background:linear-gradient(135deg,#0d1a37,#0f2a4a)}
.card.gb .c-img-wrap{background:linear-gradient(135deg,#0d2a0d,#1a3a1a)}
.card.gp .c-img-wrap{background:linear-gradient(135deg,#3a0d0d,#4a1a1a)}
.card.gd .c-img-wrap{background:linear-gradient(135deg,#0f0f2e,#1a1a4a)}

/* ── META BAR (source + category) — overlaid on image bottom ── */
.c-meta{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:8px 14px 4px;
  display:flex;align-items:center;gap:7px;
  z-index:2;
}
.c-cat{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(26,115,232,.9);
  color:#fff;font-size:10px;font-weight:800;
  letter-spacing:.05em;text-transform:uppercase;
  padding:3px 9px;border-radius:99px;
  backdrop-filter:blur(4px);
  flex-shrink:0;
}
.c-src{
  font-size:11px;font-weight:600;
  color:rgba(255,255,255,.75);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ── HEADLINE SECTION (middle ~10%) ── */
.c-head{
  flex:0 0 auto;
  padding:12px 14px 0;
  background:#111118;
}
.c-title{
  font-size:clamp(17px,4.5vw,21px);
  font-weight:800;color:#f1f1f1;
  line-height:1.3;letter-spacing:-.25px;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}

/* ── DESCRIPTION SECTION (bottom ~50%) ── */
.c-desc{
  flex:1;
  padding:10px 14px 0;
  overflow:hidden;
  background:#111118;
  position:relative;
}
.c-sum{
  font-size:14.5px;font-weight:400;
  color:rgba(255,255,255,.72);
  line-height:1.7;
  display:-webkit-box;
  -webkit-line-clamp:7;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.c-sum.exp{-webkit-line-clamp:unset;overflow:visible}
.c-more{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;font-weight:600;
  color:rgba(255,255,255,.4);
  background:none;border:none;cursor:pointer;
  font-family:inherit;padding:4px 0 0;
}

/* ── FOOTER (actions) ── */
.c-foot{
  flex:0 0 auto;
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;
  padding-bottom:max(12px, env(safe-area-inset-bottom));
  background:#111118;
  border-top:1px solid rgba(255,255,255,.06);
}
.c-time{font-size:11px;color:rgba(255,255,255,.3);flex-shrink:0}
.c-acts{display:flex;gap:6px;margin-left:auto}
.cbtn{
  display:inline-flex;align-items:center;gap:4px;
  padding:7px 13px;border-radius:99px;
  font-size:12px;font-weight:700;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);
  color:#fff;cursor:pointer;font-family:inherit;white-space:nowrap;
}
.cbtn.rp{background:rgba(147,52,230,.18);border-color:rgba(147,52,230,.35);color:#c084fc}
.cbtn.fs{background:rgba(26,115,232,.18);border-color:rgba(26,115,232,.35);color:#60a5fa}

/* ── SIDEBAR (right) ── */
.cside{
  position:absolute;right:10px;
  /* Position at 60% down — in description zone */
  top:50%;transform:translateY(-20%);
  display:flex;flex-direction:column;align-items:center;gap:16px;
  z-index:5;pointer-events:auto;
}
.sbtn{display:flex;flex-direction:column;align-items:center;gap:3px}
.sico{
  width:42px;height:42px;border-radius:50%;
  background:rgba(30,30,50,.8);
  border:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;color:rgba(255,255,255,.85);cursor:pointer;
}
.sico.on{background:rgba(147,52,230,.4);border-color:rgba(147,52,230,.6);color:#fff}
.slbl{font-size:10px;font-weight:600;color:rgba(255,255,255,.45)}

/* HEADER */
#hdr{
  position:fixed;top:0;left:0;right:0;height:54px;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
  background:linear-gradient(to bottom,rgba(0,0,0,.78),transparent);
  pointer-events:none;
}
#hdr>*{pointer-events:auto}
.hlogo{display:flex;align-items:center;gap:7px;text-decoration:none}
.hlogo img{width:26px;height:26px;border-radius:50%}
.hname{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.3px}
.hbadge{font-size:9px;font-weight:800;background:#ea4335;color:#fff;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.hbtns{display:flex;gap:6px}
.hbtn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* CATEGORY STRIP */
#cats{
  position:fixed;top:54px;left:0;right:0;z-index:49;
  display:flex;gap:7px;padding:6px 12px;
  overflow-x:auto;scrollbar-width:none;
  background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent);
}
#cats::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;padding:5px 13px;border-radius:99px;
  font-size:11px;font-weight:600;
  color:rgba(255,255,255,.62);background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.14);cursor:pointer;white-space:nowrap;
}
.chip.on{background:#fff;color:#000;border-color:transparent}

/* Progress bar and counter removed */

/* SKELETON */
#sk{position:fixed;inset:0;background:#0a0a12;z-index:30;display:flex;flex-direction:column;justify-content:flex-end;padding:20px}
@keyframes sh{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.sl{background:#1c1c2c;border-radius:5px;position:relative;overflow:hidden;margin-bottom:10px}
.sl::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);animation:sh 1.1s ease-in-out infinite}

/* SHARE SHEET */
#sov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;backdrop-filter:blur(4px)}
#sov.on{display:block}
#sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:201;
  background:#1c1c24;border-radius:18px 18px 0 0;
  padding:18px 18px max(18px,env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .26s cubic-bezier(.25,1,.5,1);
  will-change:transform;
}
#sheet.on{transform:translateY(0)}
.sh-ttl{font-size:13px;font-weight:700;color:#555;text-align:center;margin-bottom:14px}
.sh-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sh-item{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.sh-ico{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px}
.sh-lbl{font-size:11px;font-weight:500;color:#888}

/* TOAST */
#toast{
  position:fixed;bottom:72px;left:50%;
  transform:translateX(-50%) translateY(6px);
  background:rgba(0,0,0,.88);color:#fff;
  padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;
  opacity:0;pointer-events:none;z-index:500;
  transition:opacity .16s,transform .16s;white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* EMPTY */
#empty{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;background:#0a0a12}
#empty.on{display:flex}
#empty i{font-size:44px;color:rgba(255,255,255,.3);margin-bottom:14px}
#empty h3{font-size:18px;font-weight:700;color:#fff;margin-bottom:8px}
#empty p{font-size:13px;color:rgba(255,255,255,.4)}
.rbtn{margin-top:20px;padding:11px 24px;background:#1a73e8;color:#fff;border:none;border-radius:99px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* DARK MODE subtle */
html.dark .hbadge{background:#c5221f}
</style>
</head>
<body>


<div id="hdr">
  <a href="/newstally.html" class="hlogo">
    <img src="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png" alt="">
    <span class="hname">NewsTally</span>
    <span class="hbadge">Shorts</span>
  </a>
  <div class="hbtns">
    <button class="hbtn" onclick="toggleDark()" id="dark-btn"><i class="fas fa-moon" id="dark-ic"></i></button>
    <a href="/" class="hbtn" style="display:flex;align-items:center;justify-content:center;text-decoration:none"><i class="fas fa-bolt"></i></a>
  </div>
</div>

<div id="cats"><div class="chip on" data-cat="All">All</div></div>

<div id="sk">
  <div class="sl" style="width:28%;height:10px;margin-bottom:18px"></div>
  <div class="sl" style="height:22px"></div><div class="sl" style="height:22px;width:80%;margin-bottom:16px"></div>
  <div class="sl" style="height:13px"></div><div class="sl" style="height:13px;width:88%"></div><div class="sl" style="height:13px;width:70%"></div>
</div>

<div id="vp"><div id="track"></div></div>

<div id="empty">
  <i class="fas fa-wifi-slash"></i><h3>No news loaded</h3>
  <p>Check your connection</p>
  <button class="rbtn" onclick="location.reload()">Retry</button>
</div>

<div id="sov" onclick="closeShare()"></div>
<div id="sheet">
  <div class="sh-ttl">Share Story</div>
  <!-- Share card preview -->
  <div id="sh-preview" style="display:none;margin-bottom:14px;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.25)">
    <canvas id="sh-canvas" style="width:100%;display:block"></canvas>
  </div>
  <div id="sh-gen-btn" style="display:none;text-align:center;margin-bottom:14px">
    <button onclick="generateShareCard()" style="padding:9px 22px;background:#1a73e8;color:#fff;border:none;border-radius:99px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">
      <i class="fas fa-image"></i> Generate Card
    </button>
    <span id="sh-gen-label" style="font-size:11px;color:#888;display:block;margin-top:4px">Generate a shareable image card</span>
  </div>
  <div class="sh-grid">
    <div class="sh-item" onclick="doShare('card-wa')"><div class="sh-ico" style="background:#e8f5e9"><i class="fab fa-whatsapp" style="color:#25d366"></i></div><span class="sh-lbl">WhatsApp</span></div>
    <div class="sh-item" onclick="doShare('card-tw')"><div class="sh-ico" style="background:#f1f3f4"><i class="fab fa-x-twitter"></i></div><span class="sh-lbl">Twitter</span></div>
    <div class="sh-item" onclick="doShare('card-tg')"><div class="sh-ico" style="background:#e3f2fd"><i class="fab fa-telegram" style="color:#0088cc"></i></div><span class="sh-lbl">Telegram</span></div>
    <div class="sh-item" onclick="doShare('card-save')"><div class="sh-ico" style="background:#fff3e0"><i class="fas fa-download" style="color:#f29900"></i></div><span class="sh-lbl">Save Card</span></div>
    <div class="sh-item" onclick="doShare('cp')"><div class="sh-ico" style="background:#f3e5f5"><i class="fas fa-link" style="color:#9334e6"></i></div><span class="sh-lbl">Copy Link</span></div>
    <div class="sh-item" onclick="doShare('sys')"><div class="sh-ico" style="background:#e8f5e9"><i class="fas fa-share-nodes" style="color:#34a853"></i></div><span class="sh-lbl">More</span></div>
    <div class="sh-item" onclick="doShare('nt')"><div class="sh-ico" style="background:#e8f0fe"><i class="fas fa-newspaper" style="color:#1a73e8"></i></div><span class="sh-lbl">Full Story</span></div>
    <div class="sh-item" onclick="closeShare()"><div class="sh-ico" style="background:#f1f3f4"><i class="fas fa-times" style="color:#5f6368"></i></div><span class="sh-lbl">Cancel</span></div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js';
import { getFirestore, collection, getDocs, query, orderBy, limit }
  from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js';

/* ── FIREBASE ── */
const app = initializeApp({
  apiKey:'AIzaSyA4zw5cZqxLwzkTy2e5NiHz-tGKqk1KGdI',
  authDomain:'newstally-df03c.firebaseapp.com',
  projectId:'newstally-df03c',
  storageBucket:'newstally-df03c.appspot.com',
  messagingSenderId:'506893212961',
  appId:'1:506893212961:web:63882290195da992207260'
});
const db = getFirestore(app);

/* ── CONSTANTS ── */
const CK  = 'nt_sh_v2';
const CT  = 'nt_sh_t_v2';
const TTL = 5*60*1000;
const VH  = () => window.innerHeight; // unused

/* ── STATE ── */
let allNews = [], filtered = [], curIdx = 0, catNow = 'All';
let savedIds = new Set(JSON.parse(localStorage.getItem('nt_saved_news')||'[]'));
let shareItem = null;

/* ── VIRTUAL POOL (only 3 cards in DOM) ── */
// Slots: 0=prev, 1=current, 2=next
const pool    = [];   // DOM elements
let   poolMap = [-1,-1,-1]; // which data index each slot holds
let   trackY  = 0;
let   rafId   = null;

function getTopOff(){ const el=document.getElementById("cats"); return el ? el.getBoundingClientRect().bottom : 98; }
function vh() { return window.innerHeight - getTopOff(); }

function initPool() {
  const track = document.getElementById('track');
  track.innerHTML = '';
  pool.length = 0;
  poolMap = [-1,-1,-1];
  const h = vh();
  track.style.height = (3*h)+'px';
  for (let s=0;s<3;s++) {
    const el = document.createElement('div');
    el.className = 'card';
    el.style.height = h+'px';
    el.style.top    = (s*h)+'px';
    track.appendChild(el);
    pool.push(el);
  }
}

function fillSlot(slot, dataIdx) {
  poolMap[slot] = dataIdx;
  const el = pool[slot];
  const item = filtered[dataIdx];
  if (!item) { el.innerHTML=''; el.className='card'; return; }

  const isSaved = savedIds.has(item.id);
  const hasImg  = !!item.image;
  const sum     = words60(item.description || item.title);
  const needMore= sum.split(' ').length >= 55;
  const catCls  = hasImg ? '' : ' '+gradCls(item.category);

  el.className = 'card'+catCls;
  el.dataset.idx = dataIdx;

  // Image priority: first card = high, next 2 = eager, rest = lazy
  const imgPriority = dataIdx === 0 ? 'high'   : 'auto';
  const imgLoading  = dataIdx < 3   ? 'eager'  : 'lazy';

  el.innerHTML =
`<!-- IMAGE SECTION: top 38% -->
<div class="c-img-wrap">
  ${hasImg
    ? `<img class="c-img" src="${esc(item.image)}" alt=""
         loading="${imgLoading}" fetchpriority="${imgPriority}" decoding="async">`
    : `<div class="c-img-ph">
         <i class="${catIco(item.category)}" style="color:#fff"></i>
         <span>${esc(item.category)}</span>
       </div>`
  }
  <div class="c-img-fade"></div>
  <!-- Meta overlaid on image bottom -->
  <div class="c-meta">
    <span class="c-cat"><i class="${catIco(item.category)}" style="font-size:9px"></i> ${esc(item.category)}</span>
    <span class="c-src">${esc(item.source)}</span>
  </div>
</div>

<!-- HEADLINE SECTION: middle ~10% -->
<div class="c-head">
  <h2 class="c-title">${esc(item.title)}</h2>
</div>

<!-- DESCRIPTION SECTION: bottom ~50% -->
<div class="c-desc">
  ${sum ? `<p class="c-sum">${esc(sum)}</p>` : ''}
  ${needMore ? `<button class="c-more"><i class="fas fa-chevron-down" style="font-size:10px"></i> Read more</button>` : ''}
</div>

<!-- FOOTER: actions -->
<div class="c-foot">
  <span class="c-time">${fmt(item.date)}</span>
  <div class="c-acts">
    <button class="cbtn rp"><i class="fas fa-retweet"></i> Repost</button>
    <button class="cbtn fs"><i class="fas fa-arrow-right"></i> Full Story</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="cside">
  <div class="sbtn"><div class="sico${isSaved?' on':''}"><i class="${isSaved?'fas':'far'} fa-bookmark"></i></div><span class="slbl">Save</span></div>
  <div class="sbtn"><div class="sico"><i class="fas fa-share-alt"></i></div><span class="slbl">Share</span></div>
  <div class="sbtn"><div class="sico"><i class="fas fa-external-link-alt"></i></div><span class="slbl">Open</span></div>
</div>`;

  // Image load — attach to new .c-img element
  const img = el.querySelector('.c-img');
  if (img) {
    if (img.complete && img.naturalWidth) {
      img.classList.add('v');
    } else {
      img.onload  = () => img.classList.add('v');
      img.onerror = () => {
        // Replace broken img with placeholder
        const wrap = img.closest('.c-img-wrap');
        if (wrap) {
          img.remove();
          const ph = document.createElement('div');
          ph.className = 'c-img-ph';
          ph.innerHTML = `<i class="${catIco(item.category)}" style="color:#fff"></i><span>${esc(item.category)}</span>`;
          wrap.prepend(ph);
          el.classList.add(gradCls(item.category));
        }
      };
    }
  }

  // Read more
  const rm = el.querySelector('.c-more'), su = el.querySelector('.c-sum');
  if (rm && su) rm.onclick = e => {
    e.stopPropagation();
    su.classList.toggle('exp');
    rm.innerHTML = su.classList.contains('exp')
      ? '<i class="fas fa-chevron-up" style="font-size:10px"></i> Show less'
      : '<i class="fas fa-chevron-down" style="font-size:10px"></i> Read more';
  };

  // Buttons
  el.querySelector('.cbtn.fs').onclick = e => { e.stopPropagation(); go(item); };
  el.querySelector('.cbtn.rp').onclick = e => { e.stopPropagation(); doRepost(item, e.currentTarget); };

  // Sidebar
  const [sv,sh,op] = el.querySelectorAll('.sico');
  sv.onclick = e => { e.stopPropagation(); doSave(item, sv); };
  sh.onclick = e => { e.stopPropagation(); openShare(item); };
  op.onclick = e => { e.stopPropagation(); go(item); };

  // Card tap
  el.onclick = () => go(item);
}

function go(item) {
  window.location.href = '/newstallyopen.html?'+new URLSearchParams({
    nid:item.id||'', q:(item.title||'').substring(0,80),
    cat:item.category||'', src:item.source||''
  });
}

/* ── ANIMATION ENGINE ── */
function setTrack(y, instant) {
  trackY = y;
  const t = document.getElementById('track');
  if (instant) {
    t.style.transition = 'none';
    t.style.transform = `translate3d(0,${y}px,0)`;
    t.style.webkitTransform = `translate3d(0,${y}px,0)`;
    // Force reflow then re-enable transition
    t.offsetHeight;
    t.style.transition = '';
  } else {
    t.style.transition = 'transform 0.22s cubic-bezier(0.25,0.46,0.45,0.94)';
    t.style.webkitTransition = '-webkit-transform 0.22s cubic-bezier(0.25,0.46,0.45,0.94)';
    t.style.transform = `translate3d(0,${y}px,0)`;
    t.style.webkitTransform = `translate3d(0,${y}px,0)`;
  }
}

/* After navigating to newIdx, recycle pool */
function navigate(newIdx, instant) {
  if (newIdx < 0 || newIdx >= filtered.length) return;
  const oldIdx = curIdx;
  const diff   = newIdx - oldIdx;
  curIdx = newIdx;

  if (diff === 1) {
    // Swipe up → recycle slot 0 (prev) → becomes new next
    const recycled = pool.shift();
    poolMap.shift();
    pool.push(recycled);
    poolMap.push(newIdx+1);
    // Reposition recycled card physically
    recycled.style.top = ((newIdx+1)*vh())+'px';
    fillSlot(2, newIdx+1);
  } else if (diff === -1) {
    // Swipe down → recycle slot 2 (next) → becomes new prev
    const recycled = pool.pop();
    poolMap.pop();
    pool.unshift(recycled);
    poolMap.unshift(newIdx-1);
    recycled.style.top = ((newIdx-1)*vh())+'px';
    fillSlot(0, newIdx-1);
  } else {
    // Big jump → full refill
    fullRefill(newIdx);
  }

  setTrack(-(newIdx*vh()), instant);
  updateUI();
  preload(newIdx);
}

function fullRefill(idx) {
  curIdx = idx;
  for (let s=0;s<3;s++) {
    const di = idx-1+s;
    pool[s].style.top = (di*vh())+'px';
    fillSlot(s, di);
  }
  setTrack(-(idx*vh()), true);
}

function updateUI() {
  // Progress and counter removed by design
}

// Progress bar removed
function buildProgress() {}

function preload(idx) {
  [idx+1, idx+2].forEach(i => {
    if (filtered[i]?.image) { const im=new Image(); im.src=filtered[i].image; }
  });
}

/* ── TOUCH HANDLING (native-speed, no scroll-snap) ── */
let ty0=0, tyC=0, tyV=0, tyT=0, dragging=false, trackAtStart=0;

const vp = document.getElementById('vp');

vp.addEventListener('touchstart', e=>{
  ty0 = tyC = e.touches[0].clientY;
  tyV=0; tyT=performance.now();
  dragging=true; trackAtStart=trackY;
  // Kill any CSS transition immediately
  document.getElementById('track').style.transition='none';
  document.getElementById('track').style.webkitTransition='none';
}, {passive:true});

vp.addEventListener('touchmove', e=>{
  if (!dragging) return;
  e.preventDefault();
  const y=e.touches[0].clientY, now=performance.now();
  const dt=now-tyT||1;
  tyV=(y-tyC)/dt*16;
  tyC=y; tyT=now;
  const delta=y-ty0;
  let raw=trackAtStart+delta;
  // Rubber band at edges
  const maxUp  = -(filtered.length-1)*vh();
  if (raw>0)      raw*=0.2;
  if (raw<maxUp)  raw=maxUp+(raw-maxUp)*0.2;
  trackY=raw;
  const t=document.getElementById('track');
  t.style.transform=`translate3d(0,${raw}px,0)`;
  t.style.webkitTransform=`translate3d(0,${raw}px,0)`;
},{passive:false});

vp.addEventListener('touchend', ()=>{
  if (!dragging) return; dragging=false;
  const delta=tyC-ty0;
  const h=vh();
  const frac=Math.abs(delta)/h;
  const speed=Math.abs(tyV);

  let target=curIdx;
  if (frac>0.22 || speed>9) {
    target = delta<0 ? Math.min(curIdx+1,filtered.length-1) : Math.max(curIdx-1,0);
  }

  if (target!==curIdx) {
    navigate(target, false);
  } else {
    // Snap back
    setTrack(-(curIdx*vh()), false);
  }
},{passive:true});

/* ── WHEEL (desktop) ── */
let wCool=false;
vp.addEventListener('wheel', e=>{
  e.preventDefault();
  if (wCool) return; wCool=true;
  setTimeout(()=>wCool=false, 380);
  const t=e.deltaY>0 ? Math.min(curIdx+1,filtered.length-1) : Math.max(curIdx-1,0);
  if (t!==curIdx) navigate(t,false);
},{passive:false});

/* ── KEYBOARD ── */
document.addEventListener('keydown', e=>{
  if (e.key==='ArrowDown'||e.key===' ') { e.preventDefault(); const t=Math.min(curIdx+1,filtered.length-1); if(t!==curIdx)navigate(t,false); }
  if (e.key==='ArrowUp')                { e.preventDefault(); const t=Math.max(curIdx-1,0); if(t!==curIdx)navigate(t,false); }
});

/* ── CATEGORIES ── */
function buildCats() {
  const cats=['All',...new Set(allNews.map(n=>n.category).filter(Boolean))];
  const strip=document.getElementById('cats');
  strip.innerHTML=cats.map(c=>`<div class="chip${c===catNow?' on':''}" data-cat="${c}">${c}</div>`).join('');
  strip.onclick=e=>{
    const ch=e.target.closest('.chip'); if(!ch) return;
    catNow=ch.dataset.cat;
    strip.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c===ch));
    filterRender();
  };
}

function filterRender() {
  filtered = catNow==='All' ? [...allNews] : allNews.filter(n=>n.category===catNow);
  // Image-first, then newest
  filtered.sort((a,b)=>{ const ai=a.image?1:0,bi=b.image?1:0; if(bi!==ai)return bi-ai; return new Date(b.date||0)-new Date(a.date||0); });
  document.getElementById('empty').classList.toggle('on',!filtered.length);
  if (!filtered.length) return;
  curIdx=0;
  initPool();
  fullRefill(0);
  buildProgress();
  updateUI();
  preload(0);
}

/* ── SAVE ── */
function doSave(item, el) {
  const had=savedIds.has(item.id);
  if(had) savedIds.delete(item.id); else savedIds.add(item.id);

  el.innerHTML=`<i class="${savedIds.has(item.id)?'fas':'far'} fa-bookmark"></i>`;
  toast(had?'Removed':'Saved!');
}

// ── Share state ─────────────────────────────────────
let shareCanvas = null;

function openShare(item) {
  shareItem = item;
  shareCanvas = null;
  const preview = document.getElementById('sh-preview');
  const genBtn  = document.getElementById('sh-gen-btn');

/* ── Canvas card generator ─────────────────────────── */
window.generateShareCard = async function() {
  if (!shareItem) return;
  const lbl = document.getElementById('sh-gen-label');
  if (lbl) lbl.textContent = 'Generating...';

  const W = 900, H = 1200;
  const canvas = document.getElementById('sh-canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // BG gradient
  const gmap = {Cricket:['#0d2137','#1a4a2e'],Sports:['#1a0d37','#2e1a4a'],
    Technology:['#0d1a37','#1a2e4a'],Business:['#0d2a0d','#1a3a1a'],
    Politics:['#3a0d0d','#4a1a1a'],default:['#0f0f2e','#1a1a4a']};
  const [g1,g2] = gmap[shareItem.category] || gmap.default;
  const bgG = ctx.createLinearGradient(0, 0, W, H);
  bgG.addColorStop(0, g1); bgG.addColorStop(1, g2);
  ctx.fillStyle = bgG; ctx.fillRect(0, 0, W, H);

  // News image (top 42%)
  const IMG_H = Math.round(H * 0.42);
  let imgDrawn = false;
  if (shareItem.image) {
    try {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      await new Promise((res, rej) => {
        img.onload = res; img.onerror = rej;
        img.src = shareItem.image + (shareItem.image.includes('?') ? '&' : '?') + '_c=' + Date.now();
        setTimeout(rej, 5000);
      });
      ctx.save();
      ctx.beginPath(); ctx.rect(0, 0, W, IMG_H); ctx.clip();
      const scale = Math.max(W / img.naturalWidth, IMG_H / img.naturalHeight);
      const sw = img.naturalWidth * scale, sh = img.naturalHeight * scale;
      ctx.drawImage(img, (W-sw)/2, (IMG_H-sh)/2, sw, sh);
      ctx.restore(); imgDrawn = true;
    } catch(e) {}
  }

  // Overlays
  if (imgDrawn) {
    const ov = ctx.createLinearGradient(0,0,0,IMG_H);
    ov.addColorStop(0,'rgba(0,0,0,0)'); ov.addColorStop(0.6,'rgba(0,0,0,.18)'); ov.addColorStop(1,'rgba(0,0,0,.82)');
    ctx.fillStyle = ov; ctx.fillRect(0, 0, W, IMG_H);
    const fade = ctx.createLinearGradient(0,IMG_H-80,0,IMG_H+60);
    fade.addColorStop(0,'rgba(13,13,30,0)'); fade.addColorStop(1,'rgba(13,13,30,1)');
    ctx.fillStyle = fade; ctx.fillRect(0, IMG_H-80, W, 140);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,.04)'; ctx.fillRect(0, 0, W, IMG_H);
    ctx.font = '80px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,.15)';
    ctx.textAlign = 'center'; ctx.fillText('📰', W/2, IMG_H/2+30);
  }

  // Category badge
  const BY = IMG_H + 40;
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'left';
  const cat = (shareItem.category||'News').toUpperCase();
  const bw = ctx.measureText(cat).width + 40;
  ctx.beginPath();
  ctx.roundRect(44, BY-28, bw, 44, 22);
  ctx.fillStyle = '#1a73e8'; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px sans-serif';
  ctx.fillText(cat, 64, BY+4);

  // Source
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.font = '24px sans-serif';
  ctx.fillText(shareItem.source||'NewsTally', 44+bw+18, BY+4);

  // Headline
  const HY = BY + 62;
  ctx.fillStyle = '#fff'; ctx.font = 'bold 46px sans-serif';
  const hl = cWrap(ctx, shareItem.title||'', W-88, 3);
  hl.forEach((l,i) => ctx.fillText(l, 44, HY+i*60));

  // Description
  const DY = HY + hl.length*60 + 32;
  ctx.fillStyle = 'rgba(255,255,255,.75)'; ctx.font = '30px sans-serif';
  const desc = cSum(shareItem.description||shareItem.title||'', 90);
  const dl = cWrap(ctx, desc, W-88, 6);
  dl.forEach((l,i) => ctx.fillText(l, 44, DY+i*44));

  // Footer
  const LY = H - 60;
  ctx.strokeStyle = 'rgba(255,255,255,.1)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(44, LY-30); ctx.lineTo(W-44, LY-30); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,.9)'; ctx.font = 'bold 26px sans-serif';
  ctx.fillText('NewsTally Shorts', 44, LY);
  const artUrl = location.origin+'/newstallyopen.html?nid='+encodeURIComponent(shareItem.id||'');
  ctx.fillStyle = 'rgba(255,255,255,.38)'; ctx.font = '20px sans-serif';
  ctx.fillText(artUrl.length > 56 ? artUrl.substring(0,56)+'…' : artUrl, 44, LY+32);

  // Show
  const preview = document.getElementById('sh-preview');
  const genBtn  = document.getElementById('sh-gen-btn');
  if (preview) preview.style.display = 'block';
  if (genBtn)  genBtn.style.display  = 'none';

  // Cache
  canvas.toBlob(b => { shareCanvas = b; }, 'image/jpeg', 0.93);
};

function cWrap(ctx, text, maxW, maxL) {
  const words = text.split(' ');
  const lines = []; let cur = '';
  for (const w of words) {
    const t = cur ? cur+' '+w : w;
    if (ctx.measureText(t).width > maxW && cur) {
      lines.push(cur); cur = w;
      if (lines.length >= maxL) break;
    } else cur = t;
  }
  if (cur && lines.length < maxL) lines.push(cur);
  return lines;
}

function cSum(text, maxWords) {
  const w = text.trim().split(/\s+/);
  return w.length <= maxWords ? text : w.slice(0, maxWords).join(' ')+'…';
}

async function getShareBlob() {
  if (shareCanvas) return shareCanvas;
  await generateShareCard();
  return new Promise(res => {
    const canvas = document.getElementById('sh-canvas');
    canvas.toBlob(b => { shareCanvas = b; res(b); }, 'image/jpeg', 0.93);
  });
}

window.doShare = async (type) => {
  if (!shareItem) return;
  const artUrl = location.origin+'/newstallyopen.html?'+
    new URLSearchParams({nid:shareItem.id||'',q:(shareItem.title||'').substring(0,80),cat:shareItem.category||'',src:shareItem.source||''});
  const en = encodeURIComponent;

  if (type === 'cp') {
    navigator.clipboard?.writeText(artUrl).then(() => toast('Link copied!'));
    closeShare(); return;
  }
  if (type === 'nt') { location.href = artUrl; return; }
  if (type === 'sg') { location.href = '/'; return; }

  // Card-image based sharing
  let blob;
  try { blob = await getShareBlob(); } catch(e) { blob = null; }

  const fname = 'newstally-shorts.jpg';
  const file = blob ? new File([blob], fname, {type:'image/jpeg'}) : null;

  const canShareFile = file && navigator.canShare && navigator.canShare({files:[file]});

  if (type === 'card-save') {
    if (blob) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = fname; a.click();
      toast('Card saved!');
    } else toast('Generate card first');
    closeShare(); return;
  }

  if (type === 'sys') {
    if (canShareFile) { await navigator.share({files:[file],title:shareItem.title,text:artUrl}).catch(()=>{}); }
    else if (navigator.share) { await navigator.share({title:shareItem.title,url:artUrl}).catch(()=>{}); }
    else navigator.clipboard?.writeText(artUrl).then(()=>toast('Copied!'));
    closeShare(); return;
  }

  // Platform sharing — try with image file, fallback to URL
  if (canShareFile) {
    try { await navigator.share({files:[file],title:shareItem.title,text:artUrl}); closeShare(); return; } catch(e){}
  }
  const platforms = {
    'card-wa': 'https://wa.me/?text='+en(shareItem.title+'\n'+artUrl),
    'card-tw': 'https://twitter.com/intent/tweet?text='+en(shareItem.title)+'&url='+en(artUrl),
    'card-tg': 'https://t.me/share/url?url='+en(artUrl)+'&text='+en(shareItem.title),
  };
  if (platforms[type]) window.open(platforms[type]);
  closeShare();
};

/* ── TOAST ── */

  t.textContent=msg;t.classList.add('on');

}

/* ── HELPERS ── */
function fmt(s){
  if(!s)return'';const d=new Date(s),diff=Date.now()-d;
  if(isNaN(d))return'';
  if(diff<3600000)return Math.floor(diff/60000)+'m ago';
  if(diff<86400000)return Math.floor(diff/3600000)+'h ago';
  return Math.floor(diff/86400000)+'d ago';
}
function words60(t){
  const w=(t||'').trim().split(/\s+/);
  return w.length<=60?t:w.slice(0,60).join(' ')+'…';
}
function esc(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function gradCls(cat){
  const m={Cricket:'gc',Sports:'gs',Technology:'gt',Business:'gb',Politics:'gp'};
  return m[cat]||'gd';
}
function catIco(cat){
  const m={All:'fas fa-globe',Cricket:'fas fa-cricket-bat-ball',Sports:'fas fa-futbol',
    Technology:'fas fa-microchip',Business:'fas fa-chart-line',Entertainment:'fas fa-film',
    Politics:'fas fa-landmark',World:'fas fa-globe-asia',Science:'fas fa-flask',
    Health:'fas fa-heart-pulse',India:'fas fa-flag',General:'fas fa-newspaper'};
  return m[cat]||'fas fa-rss';
}
function norm(d){
  const n=d.data();
  return{id:n.id||d.id,title:n.title||n.headline||'',description:n.description||'',
    image:(n.image&&n.image.startsWith('http'))?n.image:'',
    category:n.category||'General',source:n.source||'NewsTally',
    date:n.date||n.savedAt||'',url:n.url||'#'};
}
function hideSk(){
  const sk=document.getElementById('sk');
  if(sk){sk.style.opacity='0';sk.style.transition='opacity .2s';setTimeout(()=>sk.remove(),220);}
}

/* ── FETCH ── */
async function start(){
  // Show cache instantly
  try{
    const ts=parseInt(localStorage.getItem(CT)||'0');
    if(ts&&Date.now()-ts<TTL){
      const raw=localStorage.getItem(CK);
      if(raw){allNews=JSON.parse(raw);hideSk();buildCats();filterRender();}
      if(Date.now()-ts<TTL*0.5)return; // very fresh, skip bg fetch
    }
  }catch(e){}
  await bgFetch();
}

async function bgFetch(){
  try{
    // Fast 30
    const s1=await getDocs(query(collection(db,'news'),orderBy('savedAt','desc'),limit(30)));
    if(!s1.empty){
      allNews=s1.docs.map(norm).filter(r=>r.title);
      hideSk();buildCats();filterRender();
    }
    // Full 150 bg
    setTimeout(async()=>{
      try{
        const s2=await getDocs(query(collection(db,'news'),orderBy('savedAt','desc'),limit(150)));
        if(!s2.empty){
          const d2=s2.docs.map(norm).filter(r=>r.title);
          try{localStorage.setItem(CK,JSON.stringify(d2.slice(0,150)));localStorage.setItem(CT,String(Date.now()));}catch(e){}
          allNews=d2;buildCats();
          if(curIdx===0)filterRender();
        }
      }catch(e){}
    },400);
  }catch(e){
    try{
      const s3=await getDocs(query(collection(db,'news'),limit(80)));
      allNews=s3.docs.map(norm).filter(r=>r.title);
      allNews.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
      hideSk();buildCats();filterRender();
    }catch(e2){hideSk();if(!allNews.length)document.getElementById('empty').classList.add('on');}
  }
}

/* ── RESIZE ── */
let rzTimer;
window.addEventListener('resize',()=>{
  clearTimeout(rzTimer);rzTimer=setTimeout(()=>{
    const h=vh();
    const track=document.getElementById('track');
    track.style.height=(3*h)+'px';
    pool.forEach((el,s)=>{ el.style.height=h+'px'; const di=poolMap[s]; if(di>=0)el.style.top=(di*h)+'px'; });
    setTrack(-(curIdx*h),true);
  },100);
});

setVpTop();
