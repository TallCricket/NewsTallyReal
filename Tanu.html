<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="NewsTally - Read, Repost, and Connect." />
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; }

    :root {
      --bg-primary: #f9fafb; --bg-secondary: #ffffff; --text-primary: #111827;
      --text-secondary: #4b5563; --border-color: #e5e7eb; --blue-accent: #2563eb;
      --gradient-start: #1e40af; --gradient-end: #3b82f6;
    }
    html.dark {
      --bg-primary: #111827; --bg-secondary: #1f2937; --text-primary: #f9fafb;
      --text-secondary: #9ca3af; --border-color: #374151;
      --gradient-start: #1e3a8a; --gradient-end: #3b82f6;
    }
    body { background-color: var(--bg-primary); color: var(--text-primary); transition: 0.3s; }
    .gradient-bg { background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end)); }

    /* Sticky Header */
    .sticky-header { backdrop-filter: blur(12px); background-color: rgba(255,255,255,0.9); }
    html.dark .sticky-header { background-color: rgba(31,41,55,0.9); }
    
    /* News Card */
    .news-card { 
      background-color: var(--bg-secondary); border: 1px solid var(--border-color); 
      transition: transform 0.3s ease, box-shadow 0.3s ease; opacity: 0; transform: translateY(20px);
      position: relative; display: flex; flex-direction: column;
    }
    .news-card.loaded { opacity: 1; transform: translateY(0); }
    .news-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }

    /* Repost Card Style */
    .repost-card {
        border-left: 4px solid var(--blue-accent);
        background: var(--bg-secondary);
    }

    /* Buttons on Card */
    .card-action-btn {
        width: 35px; height: 35px; border-radius: 50%; 
        display: flex; align-items: center; justify-content: center; cursor: pointer;
        transition: transform 0.2s; background: rgba(255,255,255,0.9); color: #6b7280;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    html.dark .card-action-btn { background: rgba(31,41,55,0.9); color: #d1d5db; }
    .card-action-btn:hover { transform: scale(1.1); color: var(--blue-accent); }
    
    /* Carousel */
    .carousel { position: relative; overflow: hidden; border-radius: 1.25rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); height: 400px; }
    .carousel-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.7s ease-in-out; }
    .carousel-slide.active { opacity: 1; }
    .carousel-slide img { width: 100%; height: 100%; object-fit: cover; }
    .carousel-text-container { position: absolute; bottom: 0; left: 0; right: 0; padding: 2rem; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); color: white; }
    
    /* Modals */
    #news-detail-page, #profile-page, #username-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-primary); z-index: 80; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); overflow-y: auto; }
    #news-detail-page.open, #profile-page.open { transform: translateX(0); }
    #username-modal { z-index: 150; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; transform: scale(0); opacity: 0; transition: all 0.3s; }
    #username-modal.open { transform: scale(1); opacity: 1; }

    /* Nav Panel */
    #nav-panel { position: fixed; top: 0; left: 0; height: 100%; width: 256px; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); transform: translateX(-100%); transition: transform 0.3s ease-in-out; z-index: 90; box-shadow: 2px 0 10px rgba(0,0,0,0.3); }
    #nav-panel.open { transform: translateX(0); }

    /* Tabs */
    .profile-tab { cursor: pointer; padding: 10px 20px; border-bottom: 2px solid transparent; color: var(--text-secondary); }
    .profile-tab.active { border-color: var(--blue-accent); color: var(--blue-accent); font-weight: bold; }
    .profile-content-section { display: none; }
    .profile-content-section.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Skeleton */
    .skeleton { background-color: #e5e7eb; position: relative; overflow: hidden; }
    html.dark .skeleton { background-color: #374151; }
    .skeleton::after { content: ''; position: absolute; top: 0; left: -150%; width: 150%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); animation: shimmer 1.8s infinite; }
    @keyframes shimmer { 0% { left: -150%; } 100% { left: 150%; } }

    /* Toast */
    #toast-container { position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
    .toast-message { background-color: #1f2937; color: white; padding: 12px 24px; border-radius: 50px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); font-size: 0.9rem; font-weight: 500; opacity: 0; transform: translateY(20px); animation: toast-in 0.3s forwards, toast-out 0.3s forwards 3s; }
    @keyframes toast-in { to { opacity: 1; transform: translateY(0); } }
    @keyframes toast-out { to { opacity: 0; transform: translateY(20px); } }
  </style>
</head>

  <!-- Scripts -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, updateDoc, getDoc, onSnapshot, arrayUnion, arrayRemove, collection, addDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    // CONFIGURATION
    const API_KEY = 'AIzaSyC8D-4bl3GDyj_--BGG1pPdO5Bz63r5iXI';
    const SHEET_ID = '1Wy6rzaCALqPLFx079nqBCDRP7dk3au5eRO4GuMwQ8Sk';
    const APP_ID = 'newstally-default';
    
    const firebaseConfig = { 
        apiKey: "AIzaSyA4zw5cZqxLwzkTy2e5NiHz-tGKqk1KGdI", 
        authDomain: "newstally-df03c.firebaseapp.com", 
        projectId: "newstally-df03c", 
        storageBucket: "newstally-df03c.appspot.com", 
        messagingSenderId: "506893212961", 
        appId: "1:506893212961:web:63882290195da992207260" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // GLOBAL STATE
    let state = {
        allNews: [],
        filteredNews: [],
        bookmarks: [],
        user: null,
        username: null,
        category: 'All',
        limit: 12
    };

    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);
    const showToast = (msg) => {
        const d = document.createElement('div'); d.className='toast-message'; d.innerText=msg;
        $('#toast-container').appendChild(d); setTimeout(()=>d.remove(),3500);
    };

    // --- PATH HELPERS ---
    // We use the 'artifacts' path for public data as per rules
    const getUserRef = (uid) => doc(db, 'users', uid); // Standard user profile
    const getPublicRepostsCol = () => collection(db, 'artifacts', APP_ID, 'public', 'data', 'reposts');

    // --- DATA LOADING ---
    async function loadNews() {
        $('#loading-bar').classList.remove('hidden');
        try {
            const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1?key=${API_KEY}`);
            const json = await res.json();
            state.allNews = json.values.slice(1).map(r => ({
                headline: r[1] || 'Untitled', source: r[2]||'News', date: r[3]||'', 
                description: r[4]||'', category: r[6]||'General', 
                image: r[7] && r[7].startsWith('http') ? r[7] : `https://placehold.co/600x400?text=News`
            })).reverse();
            
            renderCarousel();
            filterNews('All');
        } catch(e) { console.error(e); showToast("Error loading news"); }
        $('#loading-bar').classList.add('hidden');
    }

    // --- UI FUNCTIONS ---
    window.switchView = (viewName) => {
        $('#view-home').classList.add('hidden');
        $('#view-community').classList.add('hidden');
        $(`#view-${viewName}`).classList.remove('hidden');
        
        // Update Mobile Nav Active State
        $$('.nav-btn-mobile').forEach(b => b.classList.remove('text-blue-600', 'active'));
        if(viewName==='home') $('#mb-home').classList.add('text-blue-600', 'active');
        if(viewName==='community') $('#mb-comm').classList.add('text-blue-600', 'active');

        if(viewName === 'community') loadCommunityFeed();
    };

    window.filterCategory = (cat) => {
        state.category = cat;
        switchView('home');
        state.filteredNews = cat==='All' ? state.allNews.filter(n=>n.category!=='Top Story') : state.allNews.filter(n=>n.category===cat);
        renderFeed();
        
        // Nav styling
        $$('.nav-category').forEach(b => {
            if(b.dataset.category === cat) b.classList.add('text-blue-600'); else b.classList.remove('text-blue-600');
        });
        $('#nav-panel').classList.remove('open');
    };

    function renderCarousel() {
        const top = state.allNews.filter(n=>n.category==='Top Story').slice(0,5);
        if(!top.length) return;
        $('#carousel-content-wrapper').innerHTML = top.map((n,i) => `
            <div class="carousel-slide ${i===0?'active':''} cursor-pointer" onclick="window.openDetail('${encodeURIComponent(n.headline)}')">
                <img src="${n.image}">
                <div class="carousel-text-container"><span class="bg-blue-600 px-2 py-1 text-xs rounded">${n.category}</span><h3 class="text-xl font-bold">${n.headline}</h3></div>
            </div>
        `).join('');
        setInterval(() => {
            const c = $('.carousel-slide.active');
            const n = c.nextElementSibling || $('#carousel-content-wrapper').firstElementChild;
            c.classList.remove('active'); n.classList.add('active');
        }, 5000);
    }

    function renderFeed() {
        const list = state.filteredNews.slice(0, state.limit);
        $('#news-feed').innerHTML = list.map(n => `
            <article class="news-card rounded-xl overflow-hidden bg-white dark:bg-gray-800 shadow-sm p-0" onclick="window.openDetail('${encodeURIComponent(n.headline)}')">
                <div class="h-48 overflow-hidden relative">
                    <img src="${n.image}" class="w-full h-full object-cover">
                    <span class="absolute bottom-2 left-2 bg-black/60 text-white text-xs px-2 py-1 rounded">${n.category}</span>
                </div>
                <div class="p-4 relative">
                    <button class="card-action-btn absolute -top-5 right-4" onclick="event.stopPropagation(); window.openDetail('${encodeURIComponent(n.headline)}')"><i class="fas fa-arrow-right"></i></button>
                    <h3 class="font-bold text-lg leading-tight mb-2 text-gray-900 dark:text-white">${n.headline}</h3>
                    <div class="text-xs text-gray-400 flex justify-between mt-2"><span>${n.source}</span><span>${n.date}</span></div>
                </div>
            </article>
        `).join('');
        setTimeout(()=>$$('.news-card').forEach(c=>c.classList.add('loaded')),50);
    }
    $('#load-more-btn').onclick = () => { state.limit += 12; renderFeed(); };

    // --- DETAIL VIEW & ACTIONS ---
    window.openDetail = (encHl) => {
        const n = state.allNews.find(x => x.headline === decodeURIComponent(encHl));
        if(!n) return;
        
        $('#detail-headline').innerText = n.headline;
        $('#detail-image').src = n.image;
        $('#detail-category-badge').innerText = n.category;
        $('#detail-source-date').innerText = `${n.source} • ${n.date}`;
        $('#detail-article-content').innerHTML = n.description.split('\n').map(p=>`<p class="mb-4">${p}</p>`).join('');
        
        // Bind Buttons
        $('#detail-bookmark-btn').onclick = () => toggleBookmark(n);
        $('#detail-repost-btn').onclick = () => initiateRepost(n);
        
        // Update Bookmark Icon State
        updateBookmarkIcon(n.headline);

        $('#news-detail-page').classList.add('open');
    };
    $('#back-to-feed-btn').onclick = () => $('#news-detail-page').classList.remove('open');

    // --- COMMUNITY REPOST LOGIC ---
    
    // 1. Check/Set Username
    async function initiateRepost(newsItem) {
        if(!state.user) { showToast("Please login to repost"); signInWithPopup(auth, provider); return; }
        
        // Check if username exists in local state or fetch
        if(!state.username) {
            const userDoc = await getDoc(getUserRef(state.user.uid));
            if(userDoc.exists() && userDoc.data().username) {
                state.username = userDoc.data().username;
            } else {
                // Open Modal
                $('#username-modal').classList.add('open');
                // Pass current item to handle after save
                window.pendingRepostItem = newsItem; 
                return;
            }
        }
        postToCommunity(newsItem);
    }

    $('#save-username-btn').onclick = async () => {
        const val = $('#new-username-input').value.trim().toLowerCase().replace(/\s/g,'_');
        if(val.length < 3) { showToast("Username too short"); return; }
        
        try {
            // Save to user profile
            await setDoc(getUserRef(state.user.uid), { username: val }, { merge: true });
            state.username = val;
            $('#username-modal').classList.remove('open');
            showToast("Username saved!");
            if(window.pendingRepostItem) postToCommunity(window.pendingRepostItem);
        } catch(e) { showToast("Error saving username"); }
    };

    // 2. Post Data
    async function postToCommunity(item) {
        try {
            const docData = {
                headline: item.headline,
                image: item.image,
                source: item.source,
                repostedBy: { uid: state.user.uid, username: state.username, avatar: state.user.photoURL },
                likes: [], // Array of UIDs
                shareCount: 0,
                timestamp: new Date().toISOString()
            };
            
            await addDoc(getPublicRepostsCol(), docData);
            showToast("Reposted to Community!");
            switchView('community'); // Auto switch
        } catch(e) { console.error(e); showToast("Repost failed: " + e.message); }
    }

    // 3. Load Feed (Realtime)
    let unsubscribeFeed = null;
    function loadCommunityFeed() {
        if(unsubscribeFeed) return; // Already listening
        
        const q = query(getPublicRepostsCol(), orderBy('timestamp', 'desc'), limit(20));
        unsubscribeFeed = onSnapshot(q, (snap) => {
            const feedContainer = $('#community-feed');
            if(snap.empty) { feedContainer.innerHTML = '<div class="text-center py-10 text-gray-400">No reposts yet. Be the first!</div>'; return; }
            
            feedContainer.innerHTML = snap.docs.map(doc => {
                const d = doc.data();
                const isLiked = state.user && d.likes && d.likes.includes(state.user.uid);
                const likeCount = d.likes ? d.likes.length : 0;
                
                return `
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-4 border border-gray-100 dark:border-gray-700">
                    <div class="flex items-center gap-3 mb-3">
                        <img src="${d.repostedBy.avatar||'https://placehold.co/40?text=U'}" class="w-8 h-8 rounded-full">
                        <div>
                            <p class="text-sm font-bold dark:text-white">@${d.repostedBy.username}</p>
                            <p class="text-xs text-gray-400">reposted just now</p>
                        </div>
                    </div>
                    
                    <!-- Nested News Card -->
                    <div class="flex gap-3 bg-gray-50 dark:bg-gray-900 rounded-lg overflow-hidden cursor-pointer" onclick="window.openDetail('${encodeURIComponent(d.headline)}')">
                        <img src="${d.image}" class="w-24 h-24 object-cover">
                        <div class="p-2 flex-1">
                            <h4 class="font-bold text-sm line-clamp-2 dark:text-white">${d.headline}</h4>
                            <p class="text-xs text-gray-500 mt-1">${d.source}</p>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="flex gap-6 mt-4 text-gray-500 text-sm">
                        <button onclick="window.toggleLike('${doc.id}')" class="${isLiked ? 'text-red-500' : 'hover:text-red-500'} transition flex items-center gap-1">
                            <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i> ${likeCount}
                        </button>
                        <button onclick="window.shareRepost('${doc.id}')" class="hover:text-green-500 transition flex items-center gap-1">
                            <i class="fas fa-share"></i> ${d.shareCount||0}
                        </button>
                    </div>
                </div>
                `;
            }).join('');
        });
    }

    // 4. Like Action
    window.toggleLike = async (docId) => {
        if(!state.user) { signInWithPopup(auth, provider); return; }
        const ref = doc(getPublicRepostsCol(), docId);
        const snap = await getDoc(ref);
        if(!snap.exists()) return;
        
        const likes = snap.data().likes || [];
        if(likes.includes(state.user.uid)) {
            await updateDoc(ref, { likes: arrayRemove(state.user.uid) });
        } else {
            await updateDoc(ref, { likes: arrayUnion(state.user.uid) });
        }
    };

    window.shareRepost = async (docId) => {
        // Simple counter increment for demo
        const ref = doc(getPublicRepostsCol(), docId);
        const snap = await getDoc(ref);
        await updateDoc(ref, { shareCount: (snap.data().shareCount||0) + 1 });
        // Actual share logic
        if(navigator.share) navigator.share({title: 'NewsTally', url: window.location.href});
        else showToast("Link Copied");
    };

    // --- BOOKMARK LOGIC (Standard) ---
    async function toggleBookmark(item) {
        if(!state.user) return signInWithPopup(auth, provider);
        const ref = getUserRef(state.user.uid);
        const isB = state.bookmarks.some(b=>b.headline===item.headline);
        
        if(isB) {
            const old = state.bookmarks.find(b=>b.headline===item.headline);
            await updateDoc(ref, { bookmarks: arrayRemove(old) });
            showToast("Removed");
        } else {
            await setDoc(ref, { bookmarks: arrayUnion({ headline: item.headline, image: item.image, category: item.category }) }, { merge: true });
            showToast("Saved");
        }
    }

    function updateBookmarkIcon(hl) {
        const isB = state.bookmarks.some(b=>b.headline===hl);
        const icon = $('#detail-bookmark-btn i');
        icon.className = isB ? 'fas fa-heart text-lg text-red-500' : 'far fa-heart text-lg';
    }

    // --- AUTH LISTENER ---
    onAuthStateChanged(auth, async (user) => {
        state.user = user;
        if(user) {
            $('#sign-in-button').classList.add('hidden');
            $('#user-profile-button').classList.remove('hidden');
            $('#user-profile-photo').src = user.photoURL;
            $('#profile-name').innerText = user.displayName;
            $('#profile-photo-lg').src = user.photoURL;
            
            // Load User Data
            onSnapshot(getUserRef(user.uid), (doc) => {
                if(doc.exists()) {
                    state.bookmarks = doc.data().bookmarks || [];
                    state.username = doc.data().username || null;
                    if(state.username) $('#profile-username-display').innerText = '@'+state.username;
                    updateBookmarkIcon($('#detail-headline').innerText);
                    
                    // Render Profile Tabs
                    $('#bookmarks-list').innerHTML = state.bookmarks.map(b=>`<div class="p-2 border-b flex gap-2 items-center"><img src="${b.image}" class="w-10 h-10 rounded object-cover"><span class="text-sm truncate flex-1">${b.headline}</span></div>`).join('');
                }
            });
        } else {
            $('#sign-in-button').classList.remove('hidden');
            $('#user-profile-button').classList.add('hidden');
            state.bookmarks = [];
            state.username = null;
        }
    });

    $('#sign-in-button').onclick = () => signInWithPopup(auth, provider);
    $('#user-profile-button').onclick = () => $('#profile-page').classList.add('open');
    $('#mobile-profile-trigger').onclick = () => state.user ? $('#profile-page').classList.add('open') : signInWithPopup(auth, provider);

    // Profile Tabs
    $$('.profile-tab').forEach(t => t.onclick = () => {
        $$('.profile-tab').forEach(x => x.classList.remove('active'));
        $$('.profile-content-section').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        $(`#${t.dataset.target}`).classList.add('active');
    });

    // NAV
    $$('.nav-category').forEach(b => b.onclick = () => {
        if(b.dataset.view === 'community') switchView('community');
        else window.filterCategory(b.dataset.category);
    });
    $$('.nav-category-mobile').forEach(b => b.onclick = () => {
        $('#nav-panel').classList.remove('open');
        if(b.dataset.view === 'community') switchView('community');
        else window.filterCategory(b.dataset.category);
    });

    $('#menu-toggle').onclick = () => $('#nav-panel').classList.add('open');
    $('#close-panel').onclick = () => $('#nav-panel').classList.remove('open');

    // INIT
    loadNews();
  </script>
</body>
</html>
