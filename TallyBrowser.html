<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TallyBrowser</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <style>
        /* HTML aur Body ko poori height dena */
        html, body {
            height: 100%;
            overflow: hidden;
        }
        /* Active tab ka style */
        .active-tab::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background-color: #ffffff; /* bg-white */
        }
        .dark .active-tab::after {
            background-color: #1f2937; /* dark:bg-gray-800 */
        }
        /* Homepage search bar ke liye custom select */
        select.custom-select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }
        /* Iframe ko homepage ke upar fit karna */
        #contentFrame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="flex flex-col h-full bg-gray-300 dark:bg-gray-900 font-sans antialiased">

    <!-- ===== BROWSER FRAME START ===== -->
    
    <!-- Tab Bar -->
    <header class="flex-shrink-0 flex items-end h-10 px-2 pt-2 bg-gray-200 dark:bg-gray-700 select-none">
        <!-- Active Tab -->
        <div class="active-tab relative flex items-center bg-white dark:bg-gray-800 px-4 py-2 rounded-t-lg shadow-sm z-10">
            <span class="text-sm text-gray-800 dark:text-gray-100">Naya Tab</span>
            <button class="ml-3 text-gray-500 hover:text-gray-900 dark:hover:text-white text-xs">✕</button>
        </div>
        <!-- New Tab Button -->
        <button class="ml-1 p-2 text-gray-600 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-gray-600 rounded-full">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        </button>
    </header>

    <!-- Navigation/Address Bar -->
    <nav class="flex-shrink-0 flex items-center bg-white dark:bg-gray-800 p-2 space-x-2 shadow-md z-0">
        <!-- Back Button -->
        <button id="backButton" class="p-1 rounded-full text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>
        </button>
        <!-- Forward Button -->
        <button id="forwardButton" class="p-1 rounded-full text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
        </button>
        <!-- Reload Button -->
        <button id="reloadButton" class="p-1 rounded-full text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m-15.357-2A8.001 8.001 0 0019.418 15m0 0H15"></path></svg>
        </button>
        <!-- Home Button (New Feature) -->
        <button id="homeButton" class="p-1 rounded-full text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
        </button>
        
        <!-- Address Bar (Omnibox) -->
        <div class="flex-grow relative">
            <input type="text" id="addressBar" placeholder="Search karein ya URL type karein" class="w-full bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white border border-gray-200 dark:border-gray-600 focus:bg-white dark:focus:bg-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-full py-2 px-4 text-sm">
        </div>
    </nav>
    <!-- ===== BROWSER FRAME END ===== -->

    <!-- ===== CONTENT AREA ===== -->
    <main class="flex-grow relative bg-gradient-to-br from-gray-50 to-blue-100 dark:from-gray-900 dark:to-blue-900">
        
        <!-- 1. Homepage Content (Default) -->
        <div id="homePage" class="flex items-center justify-center w-full h-full p-4">
            <div class="w-full max-w-2xl text-center">
                <!-- Logo -->
                <h1 class="text-6xl md:text-8xl font-extrabold mb-10 text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-700 dark:from-blue-400 dark:to-indigo-500">
                    TallyBrowser
                </h1>
                <!-- Homepage Search Form -->
                <form id="homeSearchForm" class="w-full">
                    <div class="flex items-center bg-white dark:bg-gray-800 rounded-full shadow-2xl overflow-hidden h-16">
                        <!-- Engine Selector -->
                        <div class="relative h-full">
                            <select id="homeSearchEngine" class="custom-select h-full pl-5 pr-10 text-sm font-medium text-gray-700 dark:text-gray-200 bg-transparent dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 focus:outline-none focus:ring-0">
                                <option value="google">Google</option>
                                <option value="bing">Bing</option>
                                <option value="duckduckgo">DuckDuckGo</option>
                            </select>
                            <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none">
                                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                        <!-- Input -->
                        <input type="text" id="homeSearchInput" placeholder="Search anything..." class="w-full h-full px-6 py-4 text-lg bg-transparent dark:bg-gray-800 focus:outline-none focus:ring-0">
                        <!-- Button -->
                        <button type="submit" class="h-full px-6 bg-blue-600 text-white hover:bg-blue-700 transition-colors duration-200">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- 2. Iframe (Jab website load hogi) -->
        <iframe id="contentFrame" class="hidden"></iframe>

    </main>

    <!-- JavaScript Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Browser UI elements
            const addressBar = document.getElementById('addressBar');
            const backButton = document.getElementById('backButton');
            const forwardButton = document.getElementById('forwardButton');
            const reloadButton = document.getElementById('reloadButton');
            const homeButton = document.getElementById('homeButton');

            // Content area elements
            const homePage = document.getElementById('homePage');
            const contentFrame = document.getElementById('contentFrame');
            
            // Homepage search elements
            const homeSearchForm = document.getElementById('homeSearchForm');
            const homeSearchInput = document.getElementById('homeSearchInput');
            const homeSearchEngine = document.getElementById('homeSearchEngine');

            // --- Core Functions ---

            // Function to load a URL in the iframe
            function loadUrl(url) {
                homePage.classList.add('hidden'); // Homepage ko chupao
                contentFrame.classList.remove('hidden'); // Iframe ko dikhao
                contentFrame.src = url; // Naya URL load karo
                addressBar.value = url; // Address bar mein URL update karo
            }

            // Function to show the homepage
            function showHomePage() {
                contentFrame.classList.add('hidden'); // Iframe ko chupao
                contentFrame.src = 'about:blank'; // Iframe ko reset karo
                homePage.classList.remove('hidden'); // Homepage ko dikhao
                addressBar.value = ''; // Address bar ko khali karo
                homeSearchInput.value = ''; // Homepage search bar ko khali karo
            }

            // Function to get search URL from query
            function getSearchUrl(query, engine) {
                switch (engine) {
                    case 'bing':
                        return `https://www.bing.com/search?q=${encodeURIComponent(query)}`;
                    case 'duckduckgo':
                        return `https://duckduckgo.com/?q=${encodeURIComponent(query)}`;
                    case 'google':
                    default:
                        return `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                }
            }

            // --- Event Listeners ---

            // 1. Homepage Search Bar
            homeSearchForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const query = homeSearchInput.value.trim();
                if (!query) return;
                
                const engine = homeSearchEngine.value;
                const url = getSearchUrl(query, engine);
                loadUrl(url);
            });

            // 2. Top Address Bar
            addressBar.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    let query = addressBar.value.trim();
                    if (!query) return;

                    // Check karein ki yeh URL hai ya search query
                    if (query.startsWith('http://') || query.startsWith('https://') || query.includes('.')) {
                        // Agar URL hai
                        if (!query.startsWith('http')) {
                            query = 'https://' + query;
                        }
                        loadUrl(query);
                    } else {
                        // Agar search query hai (default Google)
                        const url = getSearchUrl(query, 'google');
                        loadUrl(url);
                    }
                    addressBar.blur(); // Focus hata do
                }
            });

            // 3. Navigation Buttons
            homeButton.addEventListener('click', showHomePage);

            reloadButton.addEventListener('click', () => {
                if (!contentFrame.classList.contains('hidden') && contentFrame.contentWindow) {
                    contentFrame.contentWindow.location.reload();
                }
            });

            backButton.addEventListener('click', () => {
                if (!contentFrame.classList.contains('hidden') && contentFrame.contentWindow) {
                    contentFrame.contentWindow.history.back();
                }
            });

            forwardButton.addEventListener('click', () => {
                if (!contentFrame.classList.contains('hidden') && contentFrame.contentWindow) {
                    contentFrame.contentWindow.history.forward();
                }
            });

            // Iframe load hone par address bar update karna (koshish karna)
            contentFrame.addEventListener('load', ()C => {
                try {
                    // Yeh cross-origin sites (like Google) ke liye fail ho sakta hai
                    const newLocation = contentFrame.contentWindow.location.href;
                    if (newLocation && newLocation !== 'about:blank') {
                        addressBar.value = newLocation;
                    }
                } catch (error) {
                    console.log("Cross-origin frame; address bar ko update nahi kar sakte.");
                }
            });

            // Start par homepage dikhao
            showHomePage();
        });
    </script>
</body>
</html>
