<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewsTally — Loading...</title>
<meta name="robots" content="noindex">
<meta property="og:site_name" content="NewsTally">
<meta name="theme-color" content="#1a73e8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fa;
    display:flex;align-items:center;justify-content:center;min-height:100vh;
    flex-direction:column;gap:16px}
  .logo{width:64px;height:64px;border-radius:50%;overflow:hidden;
    box-shadow:0 4px 16px rgba(26,115,232,.25)}
  .logo img{width:100%;height:100%;object-fit:cover}
  .brand{font-size:22px;font-weight:700;color:#1a73e8}
  .msg{font-size:14px;color:#5f6368}
  .bar-wrap{width:200px;height:3px;background:#e8eaed;border-radius:2px;overflow:hidden}
  .bar{height:100%;background:#1a73e8;border-radius:2px;animation:ld 1.5s ease-in-out infinite}
  @keyframes ld{0%{width:0}60%{width:80%}100%{width:100%}}
</style>
</head>
<body>
<div class="logo"><img src="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png" alt="NewsTally"></div>
<div class="brand">NewsTally</div>
<div class="bar-wrap"><div class="bar"></div></div>
<div class="msg" id="msg">Opening article...</div>
<script>
var p   = new URLSearchParams(window.location.search);
var nid = p.get('nid') || '';
var q   = p.get('q')   || '';
var cat = p.get('cat') || '';
var src = p.get('src') || '';

// Pass all params to index.html with _open=1 flag so the router auto-opens the news
var dest = '/?_open=1'
  + (nid ? '&nid=' + encodeURIComponent(nid) : '')
  + (q   ? '&q='   + encodeURIComponent(q)   : '')
  + (cat ? '&cat=' + encodeURIComponent(cat)  : '')
  + (src ? '&src=' + encodeURIComponent(src)  : '');

window.location.replace(dest);
</script>
</body>
</html>
