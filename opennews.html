<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Dynamic SEO Meta Tags -->
    <title id="meta-title">NewsTally - Loading News...</title>
    <meta name="description" id="meta-desc" content="Read the latest breaking news and headlines on NewsTally.">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="article">
    <meta property="og:title" id="og-title" content="NewsTally Headlines">
    <meta property="og:description" id="og-desc" content="Read the full story on NewsTally.">
    <meta property="og:image" id="og-img" content="https://placehold.co/1200x630?text=NewsTally">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" id="tw-title" content="NewsTally Headlines">
    
    <!-- Structured Data for Google (SEO) -->
    <script type="application/ld+json" id="structured-data">
    {
      "@context": "https://schema.org",
      "@type": "NewsArticle",
      "headline": "Loading...",
      "image": ["https://placehold.co/1200x800"],
      "datePublished": new Date().toISOString(),
      "author": {
        "@type": "Organization",
        "name": "NewsTally"
      }
    }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fafafa; color: #262626; }
        .dark { background-color: #000; color: #f5f5f5; }
        .prose p { margin-bottom: 1.5rem; line-height: 1.8; font-size: 1.125rem; }
        .skeleton { background: #e1e9ee; background-image: linear-gradient(90deg, #e1e9ee 0, #f4f8fa 40px, #e1e9ee 80px); background-size: 600px; animation: shimmer 1.6s infinite linear; }
        @keyframes shimmer { 0% { background-position: -100px } 100% { background-position: 100px } }
    </style>
</head>
<body class="pb-20">
    <!-- Header -->
    <header class="fixed top-0 w-full z-40 h-14 bg-white/90 border-b flex items-center justify-between px-4 backdrop-blur-md">
        <a href="index.html" class="flex items-center gap-2">
            <div class="bg-gradient-to-tr from-blue-600 to-purple-600 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold">N</div>
            <span class="font-bold text-lg">NewsTally</span>
        </a>
        <div class="flex gap-4 text-gray-500">
            <button onclick="shareArticle()" class="hover:text-blue-600"><i class="fas fa-share-alt"></i></button>
            <a href="index.html" class="hover:text-blue-600 text-sm font-semibold">Back to Feed</a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-20 max-w-3xl mx-auto px-4">
        <div id="loading-state">
            <div class="h-6 w-24 skeleton mb-4 rounded"></div>
            <div class="h-12 w-full skeleton mb-6 rounded"></div>
            <div class="aspect-video w-full skeleton mb-8 rounded-xl"></div>
            <div class="space-y-4">
                <div class="h-4 w-full skeleton rounded"></div>
                <div class="h-4 w-5/6 skeleton rounded"></div>
                <div class="h-4 w-4/6 skeleton rounded"></div>
            </div>
        </div>

        <article id="article-content" class="hidden">
            <span id="art-cat" class="text-xs font-bold text-blue-600 uppercase tracking-widest px-2 py-1 bg-blue-50 rounded">Category</span>
            <h1 id="art-title" class="text-3xl md:text-5xl font-black mt-4 mb-6 leading-tight">...</h1>
            
            <div class="flex items-center gap-3 mb-8 border-y py-4 border-gray-100">
                <div class="bg-gray-200 w-10 h-10 rounded-full flex items-center justify-center text-gray-500 font-bold" id="source-icon">?</div>
                <div>
                    <p id="art-source" class="font-bold text-sm">Source Name</p>
                    <p id="art-date" class="text-xs text-gray-400">Date Published</p>
                </div>
            </div>

            <img id="art-img" src="" alt="News Image" class="w-full rounded-2xl shadow-xl mb-10 object-cover max-h-[500px]">

            <div id="art-body" class="prose max-w-none text-gray-800 leading-relaxed">
                <!-- Content injected here -->
            </div>

            <hr class="my-10 border-gray-100">

            <!-- Footer Interaction -->
            <div class="flex flex-col items-center text-center p-8 bg-blue-50 rounded-3xl">
                <h3 class="text-xl font-bold mb-2">Pasand aaya?</h3>
                <p class="text-sm text-gray-600 mb-6">Is news ko Community par repost karein aur logon se connect karein.</p>
                <div class="flex gap-4">
                    <button onclick="repostNow()" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:scale-105 transition">Repost to Community</button>
                    <button onclick="shareArticle()" class="bg-white border text-gray-700 px-6 py-3 rounded-full font-bold">Share</button>
                </div>
            </div>
        </article>
    </main>

    <script>
        const SHEET_ID = '1Wy6rzaCALqPLFx079nqBCDRP7dk3au5eRO4GuMwQ8Sk';
        const API_KEY = 'AIzaSyC8D-4bl3GDyj_--BGG1pPdO5Bz63r5iXI';
        let currentItem = null;

        async function initArticle() {
            const params = new URLSearchParams(window.location.search);
            const targetHeadline = params.get('headline');

            if (!targetHeadline) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1?key=${API_KEY}`);
                const data = await response.json();
                const newsItems = data.values.slice(1).map(r => ({
                    headline: r[1],
                    source: r[2],
                    date: r[3],
                    desc: r[4],
                    category: r[6] || 'General',
                    image: r[7] && r[7].startsWith('http') ? r[7] : `https://placehold.co/600x400?text=News`
                }));

                // Search for matching headline (flexible match)
                currentItem = newsItems.find(n => n.headline === decodeURIComponent(targetHeadline)) || newsItems[0];
                
                renderArticle(currentItem);
            } catch (error) {
                console.error("Error fetching news:", error);
                document.getElementById('loading-state').innerHTML = `<p class='text-center text-red-500 py-10'>Failed to load news. Please try again.</p>`;
            }
        }

        function renderArticle(item) {
            // Update Page Elements
            document.getElementById('art-title').innerText = item.headline;
            document.getElementById('art-cat').innerText = item.category;
            document.getElementById('art-source').innerText = item.source;
            document.getElementById('art-date').innerText = item.date;
            document.getElementById('art-img').src = item.image;
            document.getElementById('art-img').alt = item.headline;
            document.getElementById('source-icon').innerText = item.source.charAt(0);
            
            // Format body content
            const bodyHtml = item.desc.split('\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('');
            document.getElementById('art-body').innerHTML = bodyHtml;

            // SEO Updates
            document.title = `${item.headline} - NewsTally`;
            document.getElementById('meta-title').innerText = item.headline;
            const shortDesc = item.desc.substring(0, 160) + '...';
            document.getElementById('meta-desc').setAttribute('content', shortDesc);
            
            // Open Graph Updates
            document.getElementById('og-title').setAttribute('content', item.headline);
            document.getElementById('og-desc').setAttribute('content', shortDesc);
            document.getElementById('og-img').setAttribute('content', item.image);

            // Structured Data Updates
            const sd = JSON.parse(document.getElementById('structured-data').innerHTML);
            sd.headline = item.headline;
            sd.image = [item.image];
            sd.description = shortDesc;
            sd.datePublished = new Date().toISOString(); 
            document.getElementById('structured-data').innerHTML = JSON.stringify(sd);

            // Show article, hide loader
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('article-content').classList.remove('hidden');
        }

        function shareArticle() {
            if (navigator.share) {
                navigator.share({
                    title: currentItem.headline,
                    text: `Check out this news on NewsTally: ${currentItem.headline}`,
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Link copied to clipboard!");
            }
        }

        function repostNow() {
            // Redirect back to main app with a flag to repost
            const repostUrl = `index.html?action=repost&headline=${encodeURIComponent(currentItem.headline)}`;
            window.location.href = repostUrl;
        }

        window.onload = initArticle;
    </script>
</body>
</html>
